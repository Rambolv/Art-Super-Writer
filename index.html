// ─── 切换章节 ───
function onReviewChChange(){
  const locked=getLockedProject(); if(!locked)return;
  const p=DB.projects[locked.name]; if(!p)return;
  const sel=document.getElementById('reviewChSelect');
  if(!sel)return;
  p._reviewSelectedCh = parseInt(sel.value);
  // 从磁盘加载该章节当前内容到编辑器
  const chNum = p._reviewSelectedCh;
  const ch = (p.chapters||[]).find(c=>c.number===chNum);
  // 检查是否有更新的草稿
  loadReviewChapterContent(locked.name, chNum);
  // 加载该章节的历史审查文件列表
  loadReviewFileList(locked.name, chNum);
  renderers.review();
}

// ─── 从磁盘读取章节最新内容到编辑器 ───
async function loadReviewChapterContent(projectName, chNum){
  const p=DB.projects[projectName]; if(!p) return;
  // 优先读取草稿（最新草稿）
  const padded = String(chNum).padStart(3,'0');
  const rHist = p._reviewHistory||{};
  const chHist = rHist[chNum]||{drafts:[],reviews:[]};
  const draftCount = chHist.drafts.length;

  if(draftCount>0){
    // 从磁盘读取最新草稿
    const content = await readFileFromDisk(projectName, 'drafts', `revised_第${padded}章_v${draftCount}.md`);
    if(content){
      const editor = document.getElementById('reviewEditor');
      if(editor) editor.value = content;
      // 同步到内存
      const ch = (p.chapters||[]).find(c=>c.number===chNum);
      if(ch) ch.content = content;
      return;
    }
  }
  // 回退到正式章节
  const content = await readFileFromDisk(projectName, 'chapters', `chapter_${padded}.md`);
  if(content){
    const editor = document.getElementById('reviewEditor');
    if(editor) editor.value = content;
    const ch = (p.chapters||[]).find(c=>c.number===chNum);
    if(ch) ch.content = content;
  }
}

// ─── 加载历史审查文件列表到下拉框 ───
let _reviewHistorySelectedFile = ''; // 记住用户选中的历史审查文件
async function loadReviewFileList(projectName, chNum){
  const sel = document.getElementById('reviewHistorySelect');
  if(!sel) return;
  sel.innerHTML = '<option value="">📋 当前审查结果</option>';
  try {
    const files = await listDiskFiles(projectName, 'reviews');
    if(!files || !files.length) return;
    const padded = String(chNum).padStart(3,'0');
    const chFiles = files.filter(f => f.includes(`第${padded}章`)).sort().reverse();
    chFiles.forEach(fname => {
      const timeMatch = fname.match(/_(\d{4}-\d{2}-\d{2}-\d{2}-\d{2}-\d{2})\.json$/);
      const label = timeMatch ? timeMatch[1].replace(/-/g,':') : fname;
      sel.innerHTML += `<option value="${fname}">🕐 ${label}</option>`;
    });
    // ★ 恢复之前选中的历史审查文件
    if(_reviewHistorySelectedFile && [...sel.options].some(o=>o.value===_reviewHistorySelectedFile)){
      sel.value = _reviewHistorySelectedFile;
    }
  } catch(e){}
}

// ─── 选择历史审查记录 ───
async function onReviewHistorySelect(chNum){
  const sel = document.getElementById('reviewHistorySelect');
  if(!sel) return;
  const fname = sel.value;
  const statusEl = document.getElementById('reviewHistoryStatus');
  if(!statusEl) return;
  const locked = getLockedProject();
  if(!locked) return;
  const p = DB.projects[locked.name];
  if(!p) return;

  if(!fname){
    // 切回当前审查结果
    _reviewHistorySelectedFile = '';
    statusEl.textContent = '';
    await loadReviewState(locked.name);
    renderers.review();
    return;
  }

  // ★ 记住选中的文件
  _reviewHistorySelectedFile = fname;

  const content = await readFileFromDisk(locked.name, 'reviews', fname);
  if(!content){ toast('无法加载审查记录','error'); return; }
  try {
    const reviewData = JSON.parse(content);
    p._lastReview = reviewData;
    statusEl.textContent = `📋 查看历史: ${fname.replace(/_(\d{4}-\d{2}-\d{2}-\d{2}-\d{2}-\d{2})\.json$/,' $1')}`;
    renderers.review();
    toast('📋 已加载历史审查');
  } catch(e){
    toast('审查记录格式错误','error');
  }
}

// ─── 保存草稿到磁盘 ───
async function saveReviewDraft(chNum){
  const locked=getLockedProject(); if(!locked){toast('请先锁定项目','error');return}
  const p=DB.projects[locked.name]; if(!p)return;
  const editor=document.getElementById('reviewEditor');
  if(!editor||!editor.value.trim()){toast('编辑器为空','error');return}
  const content = editor.value;
  const ch = (p.chapters||[]).find(c=>c.number===chNum);
  if(!ch){toast('章节不存在','error');return}

  // 更新内存
  ch.content = content;

  // 保存到磁盘
  const padded = String(chNum).padStart(3,'0');
  saveFileToDisk(locked.name, 'chapters', `chapter_${padded}.md`, content);

  // 同时也保存版本化草稿（不覆盖旧版本）
  if(!p._reviewHistory) p._reviewHistory = {};
  if(!p._reviewHistory[chNum]) p._reviewHistory[chNum] = {drafts:[],reviews:[]};
  const vNum = p._reviewHistory[chNum].drafts.length + 1;
  saveFileToDisk(locked.name, 'drafts', `revised_第${padded}章_v${vNum}.md`, content);

  // 记录版本历史
  p._reviewHistory[chNum].drafts.push({
    time: Date.now(),
    version: vNum,
    applied: ch._pendingApplied ? [...ch._pendingApplied] : [],
  });
  ch._pendingApplied = [];
  saveReviewStateSync(locked.name);
  saveDB();
  toast(`✅ 已保存 v${vNum}`);
  renderers.review();
}

// ─── 定稿章节 ───
async function approveChapter(chNum){
  const locked=getLockedProject(); if(!locked){toast('请先锁定项目','error');return}
  const p=DB.projects[locked.name]; if(!p)return;
  const ch=(p.chapters||[]).find(c=>c.number===chNum); if(!ch){toast('章节不存在','error');return}

  // 获取编辑器最新内容
  const editor=document.getElementById('reviewEditor');
  if(editor && editor.value.trim()) ch.content = editor.value;

  ch.status = 'approved';
  if(p._lastReview && p._lastReview.finalScore) ch.finalScore = p._lastReview.finalScore;

  // 保存到磁盘
  const padded = String(chNum).padStart(3,'0');
  saveFileToDisk(locked.name, 'chapters', `chapter_${padded}.md`, ch.content);

  // 记录审查到历史
  if(!p._reviewHistory) p._reviewHistory = {};
  if(!p._reviewHistory[chNum]) p._reviewHistory[chNum] = {drafts:[],reviews:[]};
  if(p._lastReview){
    p._reviewHistory[chNum].reviews.push({
      time: Date.now(), score: p._lastReview.finalScore,
      verdict: p._lastReview.verdict,
      suggestions: p._lastReview.allSuggestions?.length||0,
    });
  }

  saveReviewStateSync(locked.name);
  saveDB();
  toast(`✅ 第${chNum}章已定稿`);
  renderers.review();
}

// ─── 编辑器滚动到指定文本位置（智能匹配） ───
function scrollEditorToText(text){
  const editor = document.getElementById('reviewEditor');
  if(!editor || !text) return;
  const content = editor.value;
  if(!content) return;

  // 归一化处理（去空格/统一标点）
  function norm(t){ return t.replace(/[\s\n\r\u3000]+/g,' ').replace(/[，,]/g,',').replace(/[。.]/g,'.').replace(/[！!]/g,'!').replace(/[？?]/g,'?').replace(/[；;]/g,';').replace(/[：:]/g,':').replace(/[「」『』""]/g,'"').trim(); }
  const nContent = norm(content);
  const nText = norm(text);

  let idx = -1, matchLen = 0;

  // 策略1：精确匹配（归一化后）
  idx = nContent.indexOf(nText);
  if(idx >= 0){ matchLen = text.length; }
  else {
    // 策略2：取原文前20字
    const short = text.substring(0, Math.min(20, text.length));
    const nShort = norm(short);
    idx = nContent.indexOf(nShort);
    if(idx >= 0) matchLen = short.length;
    else {
      // 策略3：按标点分段
      const segs = text.split(/[，。！？、；：\n\r]/).filter(s=>s.trim().length>5);
      for(const seg of segs){
        const nSeg = norm(seg);
        const p = nContent.indexOf(nSeg);
        if(p >= 0){ idx = p; matchLen = seg.length; break; }
      }
    }
  }

  if(idx < 0){ toast('⚠️ 在编辑器中未找到此原文','warn'); return; }

  // 通过归一化位置反向映射到原文位置
  let actualIdx = Math.round(idx * (content.length / Math.max(nContent.length,1)));
  actualIdx = Math.max(0, Math.min(content.length - 1, actualIdx));

  const beforeText = content.substring(0, actualIdx);
  const lineNum = beforeText.split('\n').length;
  editor.focus();
  editor.scrollTop = Math.max(0, (lineNum - 5)) * 22;
  editor.setSelectionRange(actualIdx, Math.min(content.length, actualIdx + Math.min(matchLen, 80)));
  editor.style.transition = 'box-shadow 0.3s';
  editor.style.boxShadow = '0 0 0 2px var(--cyan)';
  setTimeout(()=>{ editor.style.boxShadow = 'none'; }, 1500);
}

// ─── 应用单条建议（实时替换编辑器内容） ───
function applyReviewSuggestion(chNum, sugIndex){
  const locked=getLockedProject(); if(!locked){toast('请先锁定项目','error');return}
  const p=DB.projects[locked.name]; if(!p)return;
  const lr=p._lastReview; if(!lr)return;
  const sug=lr.allSuggestions?.[sugIndex]; if(!sug)return;

  const editor=document.getElementById('reviewEditor');
  if(!editor){toast('编辑器未加载','error');return}

  const proposed = sug.proposed_change || sug.description || '';
  const original = sug.current_text || '';
  let content = editor.value || '';

  // ★ 修改前保存快照（支持撤销）
  pushEditorSnapshot();

  // ★ 先滚动到原文位置
  if(original) scrollEditorToText(original);

  // ★ 模糊匹配查找原文位置
  function norm(t){ return t.replace(/[\s\n\r\u3000]+/g,' ').replace(/[，,]/g,',').replace(/[。.]/g,'.').replace(/[！!]/g,'!').replace(/[？?]/g,'?').replace(/[；;]/g,';').replace(/[：:]/g,':').replace(/[「」『』""]/g,'"').trim(); }
  const nContent = norm(content);
  const nOriginal = norm(original);
  let found = '';

  // 策略1：归一化精确
  let pos = nContent.indexOf(nOriginal);
  if(pos >= 0){ found = content.substring(pos, pos + original.length); }
  else {
    // 策略2：取前20字
    const short = original.substring(0, Math.min(20, original.length));
    const nShort = norm(short);
    pos = nContent.indexOf(nShort);
    if(pos >= 0) found = content.substring(pos, pos + short.length);
    else {
      // 策略3：分段
      const segs = original.split(/[，。！？、；：]/).filter(s=>s.trim().length>5);
      for(const seg of segs){
        const nSeg = norm(seg);
        pos = nContent.indexOf(nSeg);
        if(pos >= 0){ found = content.substring(pos, pos + seg.length); break; }
      }
    }
  }

  if(found){
    content = content.replace(found, proposed);
    editor.value = content;
    toast(`✅ 已应用「${sug.dimension||'修改'}」建议`);
  } else if(original){
    editor.value += '\n\n<!-- 建议修改:\n' + proposed + '\n-->';
    toast('⚠️ 未找到精确原文位置，已追加到末尾','warn');
  } else {
    editor.value += '\n\n<!-- 建议修改:\n' + proposed + '\n-->';
    toast('💡 建议已追加到末尾');
  }

  // 标记为已应用
  if(!lr.appliedSuggestions) lr.appliedSuggestions = [];
  lr.appliedSuggestions.push({index:sugIndex, dimension:sug.dimension, applied:true});

  // 记录本次待应用的修改（留待保存时写入历史）
  if(!ch._pendingApplied) ch._pendingApplied = [];
  ch._pendingApplied.push(sug.dimension||'修改');

  // 自动保存草稿
  const padded = String(chNum).padStart(3,'0');
  saveFileToDisk(locked.name, 'chapters', `chapter_${padded}.md`, editor.value);

  saveReviewStateSync(locked.name);
  saveDB();
  renderers.review();
}

// ─── S1机械闸：正则规则扫描（基于 anti_slop_rules.yaml 完整实现） ───
const S1_RULES = [
  // ═══ 标点规则 ═══
  {name:'半角标点混入',pattern:/[,.;:!?](?=[^\n])/g, flag:true, severity:'BLOCK',
   detail:'中文文本中夹英文半角标点，应替换为全角'},
  {name:'破折号过量',pattern:/——(?:(?!——).)*?——(?:(?!——).)*?——/g, flag:true, severity:'BLOCK',
   detail:'单句中出现3个或以上破折号，建议减少使用'},
  {name:'省略号滥用',pattern:/\.{3,}(?:.*?\.{3,}){2,}/gs, flag:true, severity:'WARN',
   detail:'单段中省略号使用超过2次'},

  // ═══ AI禁用句式 ═══
  {name:'二元对比模板',pattern:/不是[^，,\n]{1,30}[，,]\s*而是/g, flag:true, severity:'BLOCK',
   detail:'"不是X，而是Y"二元对比模板 — AI标志性句式，直接陈述Y即可'},
  {name:'句首填充词',pattern:/[。！？\n]\s*(其实|老实说|不得不说|讲真|说真的|平心而论|坦白说)/g, flag:true, severity:'BLOCK',
   detail:'句首零承载填充词，删除后直接进入内容'},
  {name:'段尾总结腔',pattern:/(总之|总而言之|综上所述|由此可见|不难看出|不难发现|这告诉我们)/gi, flag:true, severity:'BLOCK',
   detail:'段尾总结腔 — AI最标志性特征，让读者自己得出结论'},
  {name:'过度解释',pattern:/(这意味着|这说明|这表示|换句话说|也就是说|换言之)/gi, flag:true, severity:'WARN',
   detail:'过度解释 — 读者不需要你解释含义，展示即可'},
  {name:'自问自答',pattern:/[？?]\s*(答案|原因|道理|关键)[\s\S]{0,30}(很|就|是|在)/gi, flag:true, severity:'WARN',
   detail:'自问自答模式 — AI常见填充套路，不需要问问题再自己回答'},
  {name:'强制比喻',pattern:/(就像|仿佛|宛如|犹如|如同).{1,20}(一样|一般|似的)/gi, flag:true, severity:'WARN',
   detail:'强制比喻连续出现时显得刻意'},
  {name:'情感标签',pattern:/(感到|觉得|感觉|认为|想道|心想|暗想)/gi, flag:true, severity:'WARN',
   detail:'情感标签过度 — 应展示>告知，用行动表现情绪'},
  {name:'AI味过渡',pattern:/(值得注意的是|需要指出的是|不可忽视的是|值得一提的是|尤为重要的是|更值得注意的是)/gi, flag:true, severity:'BLOCK',
   detail:'检测到学术性AI味过渡词'},
  {name:'AI味列举',pattern:/(首先[,，]|其次[,，]|再次[,，]|最后[,，]|第一[,，]|第二[,，]|第三[,，])/gi, flag:true, severity:'WARN',
   detail:'检测到结构化列举模式'},
  {name:'AI标准句式',pattern:/(在[\s\S]{0,30}中[,，][\s\S]{0,50}扮演着[\s\S]{0,20}角色|为[\s\S]{0,30}奠定了[\s\S]{0,20}基础)/gi, flag:true, severity:'BLOCK',
   detail:'检测到AI标准句式'},
  {name:'冗余副词',pattern:/(非常地|极其地|无比地|绝大地|异常地)/gi, flag:true, severity:'WARN',
   detail:'检测到冗余副词修饰'},

  // ═══ 结构问题 ═══
  {name:'段落过长',pattern:null, severity:'WARN', customCheck:function(text){
    const lines = text.split('\n').filter(l=>l.trim().length>0);
    const longLines = lines.filter(l=>l.length>500);
    return longLines.length > Math.max(2, lines.length*0.1) ? {flagged:true, detail:`${longLines.length}/${lines.length}段超过500字`} : {flagged:false};
  }},
  {name:'对话占比过低',pattern:null, severity:'WARN', customCheck:function(text){
    const quotes = (text.match(/[""「」『』""]/g)||[]).length;
    const ratio = quotes / text.length;
    if(ratio < 0.005 && text.length > 1000) return {flagged:true, detail:`对话占比仅${(ratio*100).toFixed(1)}%，小说建议适当增加对话`};
    return {flagged:false};
  }},
  {name:'段落长度均匀',pattern:null, severity:'WARN', customCheck:function(text){
    const lines = text.split('\n').filter(l=>l.trim().length>0);
    if(lines.length<3) return {flagged:false};
    const lens = lines.map(l=>l.length);
    const avg = lens.reduce((a,b)=>a+b,0)/lens.length;
    const uniform = lens.filter(l=>Math.abs(l-avg)/avg<0.2).length;
    if(uniform/lens.length>0.7 && lens.length>5) return {flagged:true, detail:`${uniform}/${lens.length}段长度接近（差异<20%），AI特征：段落均匀`};
    return {flagged:false};
  }},
  {name:'句子长度单一',pattern:null, severity:'WARN', customCheck:function(text){
    const sentences = text.split(/[。！？\n]/).filter(s=>s.trim().length>10);
    if(sentences.length<5) return {flagged:false};
    const lens = sentences.map(s=>s.length);
    let uniformCount = 0;
    for(let i=0; i<lens.length-1; i++){
      const diff = Math.abs(lens[i]-lens[i+1])/Math.max(lens[i],lens[i+1]);
      if(diff<0.2) uniformCount++;
    }
    if(uniformCount/(lens.length-1)>0.6) return {flagged:true, detail:`连续句子长度过于均匀（${uniformCount}处），AI特征明显`};
    return {flagged:false};
  }},
];

function runS1Gate(text, projectData){
  const results = [];
  for(const rule of S1_RULES){
    if(rule.customCheck){
      const r = rule.customCheck(text);
      if(r.flagged) results.push({rule:rule.name, flagged:true, severity:rule.severity||'WARN', detail:r.detail});
      else results.push({rule:rule.name, flagged:false});
    } else if(rule.pattern){
      rule.pattern.lastIndex = 0;
      const matches = text.match(rule.pattern);
      if(matches && matches.length > 0){
        results.push({rule:rule.name, flagged:true, severity:rule.severity||'WARN', detail:`发现${matches.length}处: ${matches.slice(0,3).join(', ')}${matches.length>3?'...':''}`});
      } else {
        results.push({rule:rule.name, flagged:false});
      }
    }
  }
  // 连续性引擎检查（需要项目数据）
  if(projectData){
    const continuity = runContinuityEngine(text, projectData);
    results.push(...continuity);
  }
  return results;
}

// ─── 连续性引擎（基于 Novel-OS 设计） ───
function runContinuityEngine(text, p){
  const checks = [];
  const allChapters = p.chapters||[];
  const chCount = allChapters.length;
  const lastChNum = chCount > 0 ? allChapters[allChapters.length-1].number : 0;
  const charNames = new Set();
  // ★ story_state 数据（供死角色检查等）
  const ss = p?.storyState;

  // 收集所有角色名
  Object.values(p.characters||{}).forEach(c=>{
    if(c.name) charNames.add(c.name);
  });
  // 也从 readerData 收集
  Object.values(p.readerData?.characters||{}).forEach((info,name)=>{
    charNames.add(name);
  });

  if(charNames.size === 0) return checks;

  // ─── 1. 检查从未出现的角色 ───
  charNames.forEach(name=>{
    // 在所有章节内容中搜索角色名
    let everAppeared = false;
    for(const ch of allChapters){
      if(ch.content && ch.content.includes(name)){
        everAppeared = true;
        break;
      }
    }
    if(!everAppeared && !text.includes(name)){
      checks.push({
        rule:'角色从未出现', flagged:true, severity:'CRITICAL',
        detail:`「${name}」已定义但从未在正文中出现过`
      });
    }
  });

  // ─── 2. 检查主要角色缺席（排除已死亡角色） ───
  const rolePriority = ['主角','反派','主要角色'];
  const absentChars = [];
  charNames.forEach(name=>{
    // 获取角色定位
    let role = '';
    Object.values(p.characters||{}).forEach(c=>{if(c.name===name) role=c.role||'';});
    Object.entries(p.readerData?.characters||{}).forEach(([n,info])=>{if(n===name) role=info.role||'';});
    // ★ 忽略已死亡角色
    const ssChar = ss?.characters?.[name];
    if(ssChar?.status === 'dead') return;

    if(rolePriority.includes(role)){
      // 检查最近5章是否有该角色
      let lastSeen = 0;
      for(const ch of allChapters){
        if(ch.content && ch.content.includes(name)){
          lastSeen = ch.number;
        }
      }
      if(text.includes(name)) lastSeen = lastChNum + 1;
      const absentChs = (lastChNum + 1) - lastSeen;
      if(absentChs >= 5 && lastChNum >= 5){
        absentChars.push({name, absentChs, role});
      }
    }
  });
  if(absentChars.length){
    absentChars.forEach(a=>{
      checks.push({
        rule:'主要角色缺席', flagged:true, severity:'WARNING',
        detail:`「${a.name}(${a.role})」已连续${a.absentChs}章未出现`
      });
    });
  }

  // ─── 3. 检查支线/情节线停滞 ───
  const branches = p.worldTree?.branches||p.readerData?.plot_structure?.branches||[];
  if(branches.length){
    branches.forEach((b,i)=>{
      const startCh = b.start_chapter||b.chapter||1;
      const inactiveChs = lastChNum - startCh;
      if(inactiveChs >= 3 && b.status !== '已完结' && b.status !== 'resolved'){
        checks.push({
          rule:'情节线停滞', flagged:true, severity:'WARNING',
          detail:`支线「${b.name||'支线'+(i+1)}」已${inactiveChs}章未推进（始于第${startCh}章）`
        });
      }
    });
  }

  // ─── 4. 检查伏笔超期未回收 ───
  const buds = p.worldTree?.buds||p.readerData?.plot_structure?.buds||[];
  if(buds.length){
    buds.forEach((b,i)=>{
      const plantCh = b.chapter||b.planted||1;
      const age = lastChNum - plantCh;
      const urgency = b.urgency||'中';
      if(age >= 10 && urgency !== '已回收'){
        checks.push({
          rule:'伏笔超期未回收', flagged:true, severity:age>=15?'CRITICAL':'WARNING',
          detail:`第${plantCh}章埋下的伏笔「${(b.foreshadow||b.title||'').substring(0,30)}」已${age}章未回收`
        });
      }
    });
  }

  // ─── 5. ★ 死角色活跃检查（story_state 数据） ───
  if(ss?.characters){
    Object.values(ss.characters).forEach(c=>{
      if(c.status === 'dead' && text.includes(c.name)){
        checks.push({
          rule:'死角色活跃', flagged:true, severity:'CRITICAL',
          detail:`「${c.name}」已被标记为死亡，但在当前章节中仍出现，请检查是否为回忆/闪回/幻觉，若不是则需修正`
        });
      }
    });
  }

  // ─── 6. 检查时间线推进 ───
  const totalChars = text.length;
  if(lastChNum > 0 && totalChars){
    const avgChLen = allChapters.reduce((s,c)=>s+(c.content?.length||0),0)/lastChNum;
    // 如果某章字数远低于平均，可能是时间线跳跃过快
    if(totalChars < avgChLen * 0.3 && lastChNum > 1){
      checks.push({
        rule:'章节篇幅异常', flagged:true, severity:'WARN',
        detail:`本章字数(${totalChars})仅为平均章节长度(${Math.round(avgChLen)})的${(totalChars/avgChLen*100).toFixed(0)}%，可能存在时间线跳跃或内容不足`
      });
    }
  }

  return checks;
}

// ─── 连续性指标计算（供分析时初始化和节奏控制台展示） ───
function computeContinuityMetrics(p){
  const allChapters = p.chapters||[];
  const chCount = allChapters.length;
  const lastChNum = chCount > 0 ? allChapters[allChapters.length-1].number : 0;
  const charNames = new Set();
  Object.values(p.characters||{}).forEach(c=>{if(c.name) charNames.add(c.name);});
  Object.entries(p.readerData?.characters||{}).forEach(([n])=>{charNames.add(n);});

  const metrics = {
    characterHealth: {total:0, active:0, absent:0, neverAppeared:0, items:[]},
    threadHealth: {total:0, active:0, stalled:0, resolved:0, items:[]},
    foreshadowingHealth: {total:0, pending:0, overdue:0, resolved:0, items:[]},
    pacingHealth: {chapterCount:chCount, avgChLength:0, anomalyChapters:[]},
    healthScore: 100, // 0-100，越高越健康
  };

  if(!chCount) return metrics;

  // 平均章节长度
  const avgLen = allChapters.reduce((s,c)=>s+(c.content?.length||0),0)/chCount;
  metrics.pacingHealth.avgChLength = Math.round(avgLen);

  // 角色健康度
  charNames.forEach(name=>{
    metrics.characterHealth.total++;
    let role='', lastSeen=0, everAppeared=false;
    Object.values(p.characters||{}).forEach(c=>{if(c.name===name) role=c.role||'';});
    Object.entries(p.readerData?.characters||{}).forEach(([n,info])=>{if(n===name) role=info.role||'';});

    for(const ch of allChapters){
      if(ch.content && ch.content.includes(name)){
        everAppeared = true;
        lastSeen = ch.number;
      }
    }
    if(!everAppeared){
      metrics.characterHealth.neverAppeared++;
      metrics.characterHealth.items.push({name, role, status:'never_appeared', detail:'从未在正文出现'});
    } else {
      const absent = lastChNum - lastSeen;
      if(absent >= 5){
        metrics.characterHealth.absent++;
        metrics.characterHealth.items.push({name, role, status:'absent', detail:`已${absent}章未出现`, lastSeen});
      } else {
        metrics.characterHealth.active++;
        metrics.characterHealth.items.push({name, role, status:'active', detail:`最近出现于第${lastSeen}章`});
      }
    }
  });

  // 情节线健康度
  const branches = p.worldTree?.branches||p.readerData?.plot_structure?.branches||[];
  branches.forEach(b=>{
    metrics.threadHealth.total++;
    const startCh = b.start_chapter||b.chapter||1;
    const inactive = lastChNum - startCh;
    if(b.status==='resolved'||b.status==='已完结'){
      metrics.threadHealth.resolved++;
      metrics.threadHealth.items.push({name:b.name||'未知', status:'resolved', detail:'已完结'});
    } else if(inactive >= 3){
      metrics.threadHealth.stalled++;
      metrics.threadHealth.items.push({name:b.name||'未知', status:'stalled', detail:`${inactive}章未推进`, startCh});
    } else {
      metrics.threadHealth.active++;
      metrics.threadHealth.items.push({name:b.name||'未知', status:'active', detail:`推进中`});
    }
  });

  // 伏笔健康度
  const buds = p.worldTree?.buds||p.readerData?.plot_structure?.buds||[];
  buds.forEach(b=>{
    metrics.foreshadowingHealth.total++;
    const plantCh = b.chapter||b.planted||1;
    const age = lastChNum - plantCh;
    if(b.urgency==='已回收'||b.status==='resolved'){
      metrics.foreshadowingHealth.resolved++;
      metrics.foreshadowingHealth.items.push({foreshadow:(b.foreshadow||b.title||'').substring(0,30), status:'resolved'});
    } else {
      metrics.foreshadowingHealth.pending++;
      if(age >= 10){
        metrics.foreshadowingHealth.overdue++;
        metrics.foreshadowingHealth.items.push({foreshadow:(b.foreshadow||b.title||'').substring(0,30), status:'overdue', detail:`${age}章未回收`, plantCh});
      } else {
        metrics.foreshadowingHealth.items.push({foreshadow:(b.foreshadow||b.title||'').substring(0,30), status:'pending', detail:`${age}章前埋设`});
      }
    }
  });

  // 综合健康分
  const charScore = metrics.characterHealth.total > 0
    ? (metrics.characterHealth.active / metrics.characterHealth.total) * 30 : 30;
  const threadScore = metrics.threadHealth.total > 0
    ? ((metrics.threadHealth.active + metrics.threadHealth.resolved) / metrics.threadHealth.total) * 30 : 30;
  const foreshadowScore = metrics.foreshadowingHealth.total > 0
    ? (1 - metrics.foreshadowingHealth.overdue / Math.max(metrics.foreshadowingHealth.total,1)) * 30 : 30;
  const pacingScore = metrics.pacingHealth.anomalyChapters.length === 0 ? 10 : 5;
  metrics.healthScore = Math.round(charScore + threadScore + foreshadowScore + pacingScore);

  return metrics;
}

// ─── story_state.json：构建/保存/加载 ───
function buildStoryState(p){
  const allCh = p.chapters||[];
  const chCount = allCh.length;
  const lastCh = chCount > 0 ? allCh[allCh.length-1] : null;

  const ss = {
    updatedAt: Date.now(),
    chapters: (p.chapters||[]).map(c=>({number:c.number, status:c.status||'draft', wordCount:c.content?.length||0})),
    characters: {},
    plotThreads: {},
    foreshadowingBank: [],
    timeline: [],
  };

  // 收集角色名
  const charNames = new Map();
  Object.values(p.characters||{}).forEach(c=>{if(c.name){charNames.set(c.name,{role:c.role||'主要角色',status:'alive'});}});
  Object.entries(p.readerData?.characters||{}).forEach(([n,info])=>{charNames.set(n,{role:info.role||'主要角色',status:'alive'});});

  // 扫描每章，提取角色出现位置/情绪，推进时间线
  charNames.forEach((meta, name)=>{
    let lastSeen = 0, location = '未知', emotion = '平静';
    for(const ch of allCh){
      if(ch.content && ch.content.includes(name)){
        lastSeen = ch.number;
        const locMatch = ch.content.match(new RegExp(`${name}[^。，]{0,20}(?:在|来到|前往|离开|站在|坐在|躺在)([^。，]{1,15})`));
        if(locMatch) location = locMatch[1];
        const emoMatch = ch.content.match(new RegExp(`${name}[^。，]{0,20}(?:感到|觉得|心里|脸上|带着)([^。，]{1,10}(?:怒|喜|悲|惧|惊|恐|慌|忧|愁|烦|躁|安|静|冷|淡))`));
        if(emoMatch) emotion = emoMatch[1];
      }
    }
    ss.characters[name] = {
      name, role: meta.role, status: meta.status, lastAppearance: lastSeen,
      currentLocation: lastSeen > 0 ? location : '尚未登场',
      emotionalState: lastSeen > 0 ? emotion : '未知',
    };
  });

  // 情节线程
  const branches = p.worldTree?.branches||p.readerData?.plot_structure?.branches||[];
  branches.forEach((b,i)=>{
    const startCh = b.start_chapter||b.chapter||1;
    const isResolved = b.status==='resolved'||b.status==='已完结';
    ss.plotThreads[`thread_${i+1}`] = {
      name: b.name||`支线${i+1}`, status: isResolved ? 'resolved' : 'active',
      introducedChapter: startCh, lastReferencedChapter: lastCh?.number||startCh,
    };
  });

  // 伏笔库
  const buds = p.worldTree?.buds||p.readerData?.plot_structure?.buds||[];
  buds.forEach((b,i)=>{
    const plantCh = b.chapter||b.planted||1;
    ss.foreshadowingBank.push({
      id: `bud_${i+1}`, foreshadow: (b.foreshadow||b.title||'').substring(0,60),
      plantedChapter: plantCh, urgency: b.urgency||'中',
      resolved: b.urgency==='已回收'||b.status==='resolved',
    });
  });

  // 时间线
  for(const ch of allCh){
    if(ch.content){
      ss.timeline.push({
        chapter: ch.number, day: ch.number,
        summary: ch.content.substring(0,60).replace(/\n/g,' '),
      });
    }
  }

  return ss;
}

async function saveStoryState(projectName){
  const p = DB.projects[projectName]; if(!p) return;
  const ss = buildStoryState(p);
  p.storyState = ss;
  saveFileToDisk(projectName, '', 'story_state.json', ss);
}

async function loadStoryState(projectName){
  const p = DB.projects[projectName]; if(!p) return;
  const content = await readFileFromDisk(projectName, '', 'story_state.json');
  if(content){
    try { p.storyState = JSON.parse(content); return true; } catch(e){}
  }
  p.storyState = buildStoryState(p);
  return false;
}

// ─── 生成故事上下文（注入S2审查官） ───
function getStoryContextForReviewer(p, chNum){
  const ss = p?.storyState; if(!ss) return '';
  const lines = [];
  lines.push(`【故事上下文 — 审查时参考】`);
  const activeChars = Object.values(ss.characters).filter(c=>c.lastAppearance >= chNum-3 || c.lastAppearance === 0);
  if(activeChars.length){
    lines.push(`\n活跃角色：`);
    activeChars.forEach(c=>{
      lines.push(`· ${c.name}(${c.role}) — 📍${c.currentLocation} 😶${c.emotionalState} 最近出场:第${c.lastAppearance||'?'}章`);
    });
  }
  const activeThreads = Object.values(ss.plotThreads).filter(t=>t.status==='active');
  if(activeThreads.length){
    lines.push(`\n进行中的情节线：`);
    activeThreads.forEach(t=>{
      const inactive = (chNum||1) - t.lastReferencedChapter;
      lines.push(`· ${t.name} (引入第${t.introducedChapter}章, ${inactive}章未推进)`);
    });
  }
  const pendingBuds = ss.foreshadowingBank.filter(b=>!b.resolved);
  if(pendingBuds.length){
    lines.push(`\n待回收伏笔：`);
    pendingBuds.forEach(b=>{
      const age = (chNum||1) - b.plantedChapter;
      lines.push(`· 第${b.plantedChapter}章: ${b.foreshadow} (已埋${age}章, ${b.urgency}优先级)`);
    });
  }
  // 死亡角色备注（非硬性规定）
  const deadChars = Object.values(ss.characters).filter(c=>c.status==='dead');
  if(deadChars.length){
    lines.push(`\n已死亡角色标记（⚠️仅供参考，非硬性规定）：`);
    deadChars.forEach(c=>{
      lines.push(`· 💀 ${c.name}（第${c.lastAppearance}章附近）`);
    });
    lines.push(`  → 如果当前章节出现这些角色，请判断是：a)合理闪回/回忆/幻觉/平行叙事；b)作者设下的假死伏笔；c)需标记的连续性错误。请根据上下文自行判断，不做一刀切处理。`);
  }
  return lines.join('\n');
}

// ─── 加权评定（含夹逼定理优选） ───
function calculateWeightedScore(reviews, weights, qg){
  const dimCount = DIM_KEYS.length;
  const dimAvgs = [];
  // 计算每个维度的夹逼均值：取三审中间值（去掉最高最低）
  for(let i=0; i<dimCount; i++){
    const vals = reviews.map(r=>r.scores && r.scores[i]).filter(v=>v!==undefined && v!==null);
    if(vals.length===0){dimAvgs.push(5); continue;}
    vals.sort((a,b)=>a-b);
    let avg;
    if(vals.length>=3) avg = vals[1]; // 中间值（夹逼）
    else if(vals.length===2) avg = (vals[0]+vals[1])/2;
    else avg = vals[0];
    dimAvgs.push(avg);
  }

  // 加权平均
  let weightedSum = 0, weightTotal = 0;
  dimAvgs.forEach((score, i)=>{
    const w = (weights?.dimWeights?.[DIM_KEYS[i]]) || 1.0;
    weightedSum += score * w;
    weightTotal += w;
  });
  const dimAvg = weightTotal>0?weightedSum/weightTotal:5;
  const finalScore = Math.round(dimAvg * 10); // 1-10 → 0-100

  // 检查严审的最低维度分（strict_min_dimension）
  const strictReview = reviews.find(r=>r.role==='strict');
  let minDimIssues = [];
  if(strictReview && strictReview.scores && qg){
    DIM_KEYS.forEach((k,i)=>{
      const score = strictReview.scores[i];
      if(score!==undefined && score < (qg.strictMinDim||5)){
        minDimIssues.push({dimension:DIM_NAMES[i], key:k, score, threshold:qg.strictMinDim});
      }
    });
  }

  return {dimAvgs, finalScore, minDimIssues, hasMinDimIssue: minDimIssues.length>0};
}

// ─── 门禁判定（含严审最低维度分检查） ───
function qualityGateDecision(finalScore, qg, hasMinDimIssue){
  if(hasMinDimIssue) return 'manual'; // 严审发现短板 → 必须人工审查
  if(finalScore >= qg.passThreshold) return 'pass';
  if(finalScore >= qg.reviseThreshold) return 'revise';
  return 'manual';
}

// ─── 审查主流程（S1→三审→选票→夹逼→门禁，不复选不自动应用） ───
async function startReview(projectName, chNum){
  const p = DB.projects[projectName];
  if(!p || _reviewInProgress) return;
  _reviewInProgress = true;

  const ch = (p.chapters||[]).find(c=>c.number===chNum);
  if(!ch){ toast('章节不存在','error'); _reviewInProgress=false; return; }
  const content = ch.content || '';
  if(!content || content.length<50){ toast('章节内容为空','error'); _reviewInProgress=false; return; }

  const cfg = DB.config || {};
  const qg = cfg.qualityGate || {passThreshold:75,reviseThreshold:50,maxIterations:3,strictMinDim:5};
  const rp = cfg.roleParams || {};

  p._reviewChapter = chNum;
  p._reviewStep = 0;
  renderers.review();

  // ═══ Step 1: S1 机械闸 + 连续性更新 ═══
  p._reviewStep = 1; renderers.review();
  const s1Results = runS1Gate(content, p);
  const s1Flagged = s1Results.filter(r=>r.flagged);
  // 更新连续性指标（供节奏控制台展示）
  p.continuity = computeContinuityMetrics(p);
  // ★ S1 后更新故事状态（角色出现章节/情绪更新）
  await saveStoryState(projectName);
  logAnalysis('S1','S1机械闸扫描', s1Flagged.length?s1Flagged.map(r=>r.rule).join(', '):'✅全部通过');

  // ═══ Step 2-4: S2 三审查官 ═══
  const reviewerConfig = [
    {key:'strict', label:'🔴 严审', temp: rp.strict?.temperature??0.3},
    {key:'moderate',label:'🟡 衡审', temp: rp.moderate?.temperature??0.3},
    {key:'lenient', label:'🟢 宽审', temp: rp.lenient?.temperature??0.4},
  ];
  const reviews = [];
  for(let i=0; i<reviewerConfig.length; i++){
    const r = reviewerConfig[i];
    p._reviewStep = 2+i; renderers.review();
    toast(`🔍 ${r.label} 审查第${chNum}章...`);
    try {
      const result = await callReviewer(projectName, chNum, content, r.key, r.temp, cfg);
      reviews.push({
        role: r.key, label: r.label,
        score: result.overall||result.score||50,
        comment: result.comment||'',
        scores: result.scores||DIM_KEYS.map(()=>5),
        suggestions: result.suggestions||[],
      });
      logAnalysis(r.label, `评分${reviews[reviews.length-1].score}`, `${(result.suggestions||[]).length}条建议`);
    } catch(e){
      logAnalysis('S2错误', r.label, e.message);
      reviews.push({role:r.key, label:r.label, score:50, comment:'审查异常', scores:DIM_KEYS.map(()=>5), suggestions:[]});
    }
  }

  // ═══ Step 5: 选票汇总（不做去重，保留三审全部意见） ═══
  p._reviewStep = 5; renderers.review();
  const allSuggestions = [];
  reviews.forEach(rv=>{
    (rv.suggestions||[]).forEach(s=>{
      allSuggestions.push({
        reviewer: rv.role, reviewerLabel: rv.label,
        type: s.type||'polish', location: s.location||'',
        dimension: (s.expected_improvement?.dimension)||s.dimension||'',
        current_text: s.current_text||'',
        proposed_change: s.proposed_change||s.description||'',
        reasoning: s.reasoning||'', description: s.description||'',
      });
    });
  });
  logAnalysis('选票汇总', `三审共${allSuggestions.length}条意见`, `${reviews.map(r=>r.label+'('+(r.suggestions||[]).length+')').join(' ')}}`);

  // ═══ Step 6: 夹逼优选（对全部意见计算质量分） ═══
  p._reviewStep = 6; renderers.review();
  const squeezeResult = computeSqueeze(allSuggestions, reviews);
  // ★ 将夹逼评分附加到每条建议上
  if(squeezeResult.allScores){
    squeezeResult.allScores.forEach((sc, i)=>{
      if(allSuggestions[i]) allSuggestions[i]._squeeze = sc;
    });
  }
  logAnalysis('夹逼优选', squeezeResult.winner?`最优${squeezeResult.winner.dimension||''}`:'无', squeezeResult.proof||'');

  // ═══ Step 7: 投票确认 ═══
  p._reviewStep = 7; renderers.review();
  let finalSuggestion = squeezeResult.winner;
  let voteRecord = null;
  if(squeezeResult.winner && squeezeResult.confidence<0.85 && squeezeResult.runnerUp){
    toast('🗳️ 夹逼置信度低，投票确认中...');
    const voteSystemPrompt = '你是一位最终裁决者，在两个修改建议中做出选择。';
    const voteUserPrompt = `作为最终裁决者，在两个修改建议中投票选择一个。\n\n建议A: ${squeezeResult.winner.suggestion||''}\n\n建议B: ${squeezeResult.runnerUp.suggestion||''}\n\n输出JSON: {"vote_for":"A|B","confidence":0.0-1.0,"reasoning":"理由"}`;
    try {
      const voteR = await callLLM([{role:'user', content:voteUserPrompt}],
        {max_tokens:512, temperature:0.2});
      // ★ 保存投票 LLM 交互记录到磁盘
      const av = p?.analysisCount || 1;
      const padded = String(chNum).padStart(3,'0');
      voteRecord = {
        chapter: chNum, timestamp: new Date().toISOString(),
        temperature: 0.2, model: DB.config?.model||'',
        systemPrompt: voteSystemPrompt, userPrompt: voteUserPrompt, response: voteR,
        candidateA: squeezeResult.winner,
        candidateB: squeezeResult.runnerUp,
        voteResult: null,
      };
      saveFileToDisk(projectName, `projectLog/v${av}`, `voter_第${padded}章.json`, voteRecord);
      const jm = voteR.match(/\{[\s\S]*\}/);
      if(jm){ const vd=JSON.parse(jm[0]); if(vd.vote_for==='B') finalSuggestion=squeezeResult.runnerUp; voteRecord.voteResult=vd; squeezeResult.voteResult=vd; }
    } catch(e){}
  }

  // ═══ Step 8: 评分+门禁 ═══
  p._reviewStep = 8; renderers.review();
  const {dimAvgs, finalScore, minDimIssues, hasMinDimIssue} = calculateWeightedScore(reviews, cfg, qg);
  const combinedScore = Math.round(finalScore);
  const verdict = qualityGateDecision(combinedScore, qg, hasMinDimIssue);

  // 构建审查记录（不复选，不自动修订）
  const rKeys = {strict:'🔴 严审', moderate:'🟡 衡审', lenient:'🟢 宽审'};
  const reviewRecord = {
    chapter: chNum, iteration:1, timestamp:Date.now(),
    finalScore: combinedScore, verdict, passed: verdict==='pass',
    s1Results, minDimIssues, hasMinDimIssue,
    reviewers: {},
    dimScores: dimAvgs.map((v,i)=>({dimension:DIM_NAMES[i], average:v*10})),
    feedback: reviews.map(r=>`${r.label}: ${r.comment||''}`).join('\n'),
    allSuggestions: allSuggestions,
    squeezeResult: {
      winner: finalSuggestion?{id:finalSuggestion.id, strict:finalSuggestion.strict, moderate:finalSuggestion.moderate, lenient:finalSuggestion.lenient, width:finalSuggestion.width, convergence:finalSuggestion.convergence, quality:finalSuggestion.quality, suggestion:finalSuggestion.suggestion||''}:null,
      runnerUp: squeezeResult.runnerUp?{strict:squeezeResult.runnerUp.strict, moderate:squeezeResult.runnerUp.moderate, lenient:squeezeResult.runnerUp.lenient, suggestion:squeezeResult.runnerUp.suggestion||''}:null,
      confidence: squeezeResult.confidence||0, proof: squeezeResult.proof||'', voteResult: squeezeResult.voteResult||null,
    },
    appliedSuggestions: [],
    _steps: {s1:true, s2_strict:true, s2_moderate:true, s2_lenient:true, ballot:true, squeeze:true, vote:true, gate:true},
  };
  reviewerConfig.forEach((r,i)=>{
    reviewRecord.reviewers[r.key] = {score: reviews[i]?.score||50, comment: reviews[i]?.comment||'', suggestions_count: (reviews[i]?.suggestions||[]).length};
  });

  p._lastReview = reviewRecord;
  p.qualityHistory = p.qualityHistory || [];
  p.qualityHistory.push({chapter:chNum, final_score:combinedScore, iteration:1, verdict, timestamp:Date.now()});
  // ★ 显式保存审查状态到磁盘（即时生效，不依赖saveDB）
  saveReviewStateSync(projectName);
  saveDB();
  renderers.review();

  const ts = new Date().toISOString().replace(/[T:]/g,'-').slice(0,19);
  saveFileToDisk(projectName, 'reviews', `review_第${String(chNum).padStart(3,'0')}章_${ts}.json`, reviewRecord);
  logAnalysis('审查完成', `第${chNum}章`, `总分${combinedScore} ${verdict}，${allSuggestions.length}条建议`);

  if(verdict==='pass') toast(`✅ 第${chNum}章审查完成（${combinedScore}分），可点击「定稿」确认`);
  else if(verdict==='revise') toast(`🔄 第${chNum}章 ${combinedScore}分，可逐条点击「应用此建议」修改`);
  else toast(`⚠️ 第${chNum}章 ${combinedScore}分，需人工审查建议后定稿`);
  _reviewInProgress = false;
}

// ─── 夹逼定理优选器（SqueezeSelector） ───
function computeSqueeze(suggestions, reviews){
  if(!suggestions||!suggestions.length) return {winner:null, runnerUp:null, confidence:0, proof:'无建议可选'};

  // 计算每条建议在三维空间中的坐标
  const coords = suggestions.map(sug=>{
    const rv = {};
    reviews.forEach(r=>{ rv[r.role]=r; });

    // 计算每个审查官对该建议的认可度
    // 同一审查官的建议认可度=1.0；同维度认可度=0.7；同位置认可度=0.5；其他=0.2
    function endorsement(reviewerRole, suggestion){
      const r = rv[reviewerRole];
      if(!r) return 0;
      const sameReviewer = r.suggestions?.filter(s=>s.proposed_change===suggestion.proposed_change||s.description===suggestion.description).length>0;
      if(sameReviewer) return {score:1.0, source:'自提'};
      const sameDim = r.suggestions?.filter(s=>(s.expected_improvement?.dimension||s.dimension)===suggestion.dimension).length>0;
      if(sameDim) return {score:0.7, source:'同维度'};
      if(suggestion.location && r.suggestions?.filter(s=>s.location===suggestion.location).length>0) return {score:0.5, source:'同位置'};
      return {score:0.2, source:'其他'};
    }

    const strictE = endorsement('strict', sug);
    const moderateE = endorsement('moderate', sug);
    const lenientE = endorsement('lenient', sug);
    const U = strictE.score, M = moderateE.score, L = lenientE.score;

    // 夹逼度量
    const width = Math.abs(U - L);
    const convergence = 1 / (1 + width);
    const center = (U + L) / 2;
    const alignment = 1 - Math.abs(M - center);
    const quality = convergence * alignment;
    const squeezed = width < 0.3;

    return {
      id: sug.id, reviewer: sug.reviewer,
      suggestion: sug.proposed_change,
      strict: U, moderate: M, lenient: L,
      width, convergence, center, alignment, quality, squeezed,
      strictSource: strictE.source,
      dimension: sug.dimension,
    };
  });

  // 按质量分降序排列
  coords.sort((a,b)=>b.quality - a.quality);

  if(coords.length===0) return {winner:null, runnerUp:null, confidence:0, proof:'无可用建议'};

  const winner = coords[0];
  const runnerUp = coords.length>1 ? coords[1] : null;

  // 夹逼置信度 = 收敛度 × 对齐度（完美=1.0）
  const confidence = winner.squeezed ? Math.min(1, winner.convergence * 1.2) : winner.quality;

  // 生成数学证明
  const proof = `夹逼定理优选过程：

建议「${winner.suggestion?.substring(0,40)||winner.dimension}」的夹逼坐标：
  上界 U = 严审认可度 ${(winner.strict*100).toFixed(0)}%（${winner.strictSource}）
  中值 M = 衡审认可度 ${(winner.moderate*100).toFixed(0)}%
  下界 L = 宽审认可度 ${(winner.lenient*100).toFixed(0)}%（${winner.lenient===winner.strict?'与严审一致':winner.lenient>winner.strict?'宽审比严审更认可':'严审比宽审更认可'}）

夹逼度量：
  夹逼宽度 w = |U-L| = ${(winner.width*100).toFixed(0)}%
  夹逼收敛度 c = 1/(1+w) = ${(winner.convergence*100).toFixed(0)}%
  有界中心 bc = (U+L)/2 = ${(winner.center*100).toFixed(0)}%
  中值对齐度 a = 1-|M-bc| = ${(winner.alignment*100).toFixed(0)}%
  夹逼质量 q = c×a = ${(winner.quality*100).toFixed(0)}%

${winner.squeezed?'✅ 夹逼区间收敛！严审和宽审达成一致，建议可信度高。':'⚠️ 夹逼区间较宽，建议置信度偏低。'}
${runnerUp?`\n备选建议质量分: ${(runnerUp.quality*100).toFixed(0)}%`:'\n仅有一条建议，夹逼定理平凡成立。'}`;

  return {winner, runnerUp, confidence, proof, allScores: coords};
}

/** 对当前生成的章节内容进行质量分析：写作优缺点、节奏匹配度、读者吸引力评分 */
async function analyzeChapterContent(projectName, chNum, content){
  const p = DB.projects[projectName];
  if(!p){ toast('项目不存在','error'); return; }
  const context = getWriterContext(projectName);

  const systemPrompt = `你是一位专业的小说编辑和阅读体验分析师。你的任务是对小说章节内容进行深入分析。`;

  let userPrompt = `请对第${chNum}章的内容进行分析。\n\n`;
  userPrompt += `【章节内容】\n${content.slice(0, 8000)}\n\n`;
  if(context){
    userPrompt += `【故事上下文——供参考】\n${context.slice(0, 3000)}\n\n`;
  }
  userPrompt += `请从以下维度分析，输出 JSON 格式（只输出JSON，不要其他文字）：\n
{
  "chapter": ${chNum},
  "reader_appeal": { "score": 1-10, "reason": "..." },
  "rhythm_fit": { "score": 1-10, "reason": "..." },
  "strengths": ["优点1", "优点2", "优点3"],
  "weaknesses": ["不足1", "不足2"],
  "improvements": ["改进建议1", "改进建议2"],
  "overall_rating": 1-10,
  "summary": "一段简短的整体评价"
}`;

  try {
    logAnalysis('章节分析', `第${chNum}章质量分析`, '发送中...');
    const result = await callLLMStream([
      {role:'system', content:systemPrompt},
      {role:'user', content:userPrompt}
    ], {max_tokens: 4096, temperature: 0.5}, (partial) => {});

    logAnalysis('章节分析结果', '', result);

    // 尝试解析JSON并显示
    try {
      const data = JSON.parse(result);
      let html = `<div class="card" style="border-left:3px solid var(--cyan);margin-top:12px">
        <div class="card-title">📊 第${chNum}章分析报告</div>
        <div style="display:flex;gap:16px;margin-bottom:10px;flex-wrap:wrap">
          <div style="text-align:center;padding:8px 16px;background:rgba(0,212,255,.1);border-radius:8px">
            <div style="font-size:24px;font-weight:700;color:var(--cyan)">${data.overall_rating||'?'}</div>
            <div style="font-size:11px;color:var(--text-dim)">综合评分</div>
          </div>
          <div style="text-align:center;padding:8px 16px;background:rgba(0,212,255,.1);border-radius:8px">
            <div style="font-size:24px;font-weight:700;color:var(--cyan)">${data.reader_appeal?.score||'?'}</div>
            <div style="font-size:11px;color:var(--text-dim)">读者吸引力</div>
          </div>
          <div style="text-align:center;padding:8px 16px;background:rgba(0,212,255,.1);border-radius:8px">
            <div style="font-size:24px;font-weight:700;color:var(--cyan)">${data.rhythm_fit?.score||'?'}</div>
            <div style="font-size:11px;color:var(--text-dim)">节奏匹配度</div>
          </div>
        </div>`;
      if(data.summary) html += `<div style="font-size:13px;color:var(--text);margin-bottom:10px;padding:8px;background:rgba(255,255,255,.05);border-radius:6px">${data.summary}</div>`;
      if(data.strengths?.length) html += `<div style="margin-bottom:8px"><div style="font-weight:600;color:var(--green);font-size:13px">✅ 优点</div>${data.strengths.map(s=>'<div style="font-size:12px;padding:2px 0">· '+s+'</div>').join('')}</div>`;
      if(data.weaknesses?.length) html += `<div style="margin-bottom:8px"><div style="font-weight:600;color:var(--accent);font-size:13px">⚠️ 不足</div>${data.weaknesses.map(w=>'<div style="font-size:12px;padding:2px 0">· '+w+'</div>').join('')}</div>`;
      if(data.improvements?.length) html += `<div><div style="font-weight:600;color:var(--orange);font-size:13px">💡 改进建议</div>${data.improvements.map(i=>'<div style="font-size:12px;padding:2px 0">· '+i+'</div>').join('')}</div>`;
      html += `</div>`;

      // 将分析报告显示在结果区域下方
      const container = document.getElementById('writerResult');
      const existingReport = document.getElementById('chapterAnalysisReport');
      if(existingReport) existingReport.remove();
      const div = document.createElement('div');
      div.id = 'chapterAnalysisReport';
      div.innerHTML = html;
      container.parentNode.insertBefore(div, container.nextSibling);
    } catch(e){
      toast('分析完成，但结果格式异常，请查看日志','warn');
    }

    // 保存分析结果到 projectLog（用时间戳区分多次评价）
    const ts = new Date().toISOString().replace(/[T:]/g,'-').slice(0,19);
    saveFileToDisk(projectName, 'projectLog/v'+(p.analysisCount||1),
      'draft_review_第'+String(chNum).padStart(3,'0')+'章_'+ts+'.json',
      {chapter:chNum, content: content.slice(0,500), analysis: result, analyzedAt: new Date().toISOString()});

    toast(`📊 第${chNum}章分析完成`);
  } catch(e){
    toast('❌ 分析失败: '+e.message,'error');
  }
}

// 导入SKILL：触发文件选择
function importWriterSkill(projectName){
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.md,.txt';
  input.multiple = true;
  input.onchange = (e) => handleSkillFileImport(e, projectName);
  input.click();
}

// 处理文件选择：读取内容并保存到 skills/external/
async function handleSkillFileImport(event, projectName){
  const files = event.target.files;
  if(!files || !files.length) return;
  let imported = 0;
  for(const file of files){
    try {
      const content = await new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = () => reject(reader.error);
        reader.readAsText(file, 'UTF-8');
      });
      if(content && content.trim()){
        await saveFileToDisk(projectName, 'skills/external', file.name, content);
        imported++;
      }
    } catch(e){
      console.error('导入SKILL失败:', file.name, e);
      toast(`❌ 导入 ${file.name} 失败`,'error');
    }
  }
  if(imported > 0){
    toast(`✅ 已导入 ${imported} 个SKILL`);
    renderers.writer(); // 刷新列表
  }
}

// 删除SKILL
async function deleteWriterSkill(projectName, filename){
  if(!confirm(`确定删除 SKILL「${filename}」？`)) return;
  try {
    await fetch('http://127.0.0.1:8899/api/project/delete-file', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body:JSON.stringify({project:projectName, folder:'skills/external', file:filename})
    });
    toast(`🗑️ 已删除「${filename}」`);
    renderers.writer();
  } catch(e){
    toast('❌ 删除失败（服务器未启动？）','error');
  }
}

// 加载所有SKILL内容（用于注入提示词）
async function loadWriterSkills(projectName){
  try {
    const files = await listDiskFiles(projectName, 'skills/external');
    if(!files || !files.length) return '';
    const contents = [];
    for(const f of files){
      const content = await readFileFromDisk(projectName, 'skills/external', f);
      if(content && content.trim()){
        contents.push(`### ${f.replace(/\\.(md|txt)$/i,'')}\n${content.trim()}`);
      }
    }
    return contents.length ? '\n【前置写作技巧——以下规则必须在写作中严格遵守】\n\n' + contents.join('\n\n---\n\n') : '';
  } catch(e){ return ''; }
}

// ═══════ 写作台：AI写作 ═══════
async function writeChapter(projectName, chNum, direction, temperature, maxWords){
  const p = DB.projects[projectName];
  const context = getWriterContext(projectName);
  const chapters = p.chapters||[];
  const prevChapter = chapters.filter(c=>c.number<chNum).sort((a,b)=>b.number-a.number)[0];

  // ★ 加载前置SKILL并注入到系统提示词
  const skillsContent = await loadWriterSkills(projectName);
  const systemPrompt = `你是一位擅长${p.genre||'长篇'}小说创作的作家。你的任务是写出高质量的小说章节内容。

${WRITER_BEHAVIORAL_PRINCIPLES}
${skillsContent}
写作时请注意：
1. 角色行为必须符合他们的性格和行为模式——不能为了推动剧情而让角色做出不符合人设的事
2. 如果角色要做出的行为与其惯常模式不同，必须在上下文中提供充分的动机、铺垫和代价
3. 角色间的互动要符合他们之间的关系状态——信任、防备、合作或对抗
4. 关注读者当前的节奏感受，该加速时加速，该沉淀时沉淀
5. 一次写好这一章，不要依赖后续修改`;

  let userPrompt = `请写第${chNum}章。\n`;

  if(prevChapter){
    userPrompt += `\n上一章（第${prevChapter.number}章）结尾：\n${prevChapter.content.slice(-200)}\n\n`;
  }

  if(context){
    userPrompt += `以下是当前的故事状态和角色信息，写作时必须严格遵守：\n\n${context}\n`;
  }

  userPrompt += `【写作方向】\n${direction}\n\n`;
  userPrompt += `请写出一章约${maxWords}字的小说内容。直接输出章节正文，不要额外说明。`;

  // ★ 发送前把完整提示词保存到 projectLog
  const fullPrompt = `【System】\n${systemPrompt}\n\n【User】\n${userPrompt}`;
  logAnalysis('写作发送', `第${chNum}章 → LLM`, `温度${temperature}，目标${maxWords}字`);
  logAnalysis('完整提示词', '', fullPrompt);
  const p3 = DB.projects[projectName];
  if(p3?.folders?.projectLog){
    saveFileToDisk(projectName, 'projectLog/v'+(p3.analysisCount||1),
      'writer_prompt_第'+String(chNum).padStart(3,'0')+'章.json',
      {
        chapter: chNum,
        direction,
        temperature,
        maxWords,
        sentAt: new Date().toISOString(),
        systemPrompt,
        userPrompt,
        fullPrompt
      });
  }

  try {
    // 使用流式调用，实时显示生成内容
    const content = await callLLMStream([
      {role:'system', content:systemPrompt},
      {role:'user', content:userPrompt}
    ], {max_tokens: Math.min(maxWords * 2, 16384), temperature}, (partial) => {
      // 实时更新显示
      const el = document.getElementById('writerContent');
      if(el) el.value = partial;
    });

    // 显示结果
    document.getElementById('writerContent').value = content;
    document.getElementById('writerResult').style.display = 'block';
    toast('✅ 写作完成！');

    // ★ 自动保存到草稿（不覆盖正式章节，仅作备份，防止切换页面丢失）
    const p2 = DB.projects[projectName];
    if(!p2.drafts) p2.drafts = [];
    const draftIdx = p2.drafts.findIndex(d=>d.number===chNum);
    const draftData = {number:chNum, content, status:'draft', title:'', created_at:new Date().toISOString()};
    if(draftIdx>=0) p2.drafts[draftIdx] = {...p2.drafts[draftIdx], ...draftData};
    else p2.drafts.push(draftData);
    p2.drafts.sort((a,b)=>a.number-b.number);
    saveFileToDisk(projectName, 'drafts', `draft_第${String(chNum).padStart(3,'0')}章.md`, content);

    return content;
  } catch(e){
    toast('❌ 写作失败: '+e.message,'error');
    throw e;
  }
}

// ═══════ 历史日志页面 ═══════
renderers.history = function(){
  const main = document.getElementById('page-history');
  const side = document.getElementById('page-history-side');
  const locked = getLockedProject();
  if(!locked){main.innerHTML=lockedMsg();side.innerHTML='';return}
  const p = DB.projects[locked.name];
  const logs = p.folders?.projectLog || [];

  // 分析过程日志（按会话分组显示）
  let analysisHtml = '';
  if(_analysisLogEntries.length > 0){
    // 当前会话
    analysisHtml += `<div class="card"><div class="card-title">🔍 分析过程日志</div>
      <div style="max-height:60vh;overflow-y:auto">
      <div style="font-size:11px;color:var(--cyan);padding:4px 0;border-bottom:1px solid var(--border)}">🟢 当前会话 ${new Date(_currentSessionId).toLocaleString()}</div>`;
    _analysisLogEntries.forEach(e=>{
      analysisHtml += `<div class="history-entry">
        <span class="h-time">${e.time||''}</span>
        <div class="h-round">${e.round}</div>
        ${e.question ? `<div class="h-q">📤 ${e.question}</div>` : ''}
        ${e.answer ? `<div class="h-a">📥 ${e.answer}</div>` : ''}
      </div>`;
    });
    analysisHtml += `</div></div>`;
  } else {
    // 从磁盘读取，按会话分组
    const allLogs = logs.filter(l=>l.type==='analysis_log');
    // 提取所有会话标记
    const sessions = logs.filter(l=>l.type==='analysis_session_start' || l.type==='analysis_session_end');
    // 按 sessionId 分组
    const groups = {};
    for(const l of allLogs){
      const sid = l.sessionId || 'unknown';
      if(!groups[sid]) groups[sid] = [];
      groups[sid].push(l);
    }
    const sessionIds = Object.keys(groups).sort((a,b)=>b-a).slice(0,5); // 最近5次
    if(sessionIds.length > 0){
      analysisHtml = `<div class="card"><div class="card-title">🔍 分析过程日志</div>
        <div style="max-height:60vh;overflow-y:auto">`;
      for(const sid of sessionIds){
        const startMarker = sessions.find(s=>s.sessionId==parseInt(sid) && s.type==='analysis_session_start');
        const timeStr = startMarker?.time || new Date(parseInt(sid)).toLocaleString();
        analysisHtml += `<div style="font-size:11px;color:var(--text-muted);padding:6px 0 2px;border-top:1px solid var(--border);margin-top:6px">📅 ${timeStr}</div>`;
        groups[sid].forEach(e=>{
          analysisHtml += `<div class="history-entry">
            <span class="h-time">${e.timestamp ? new Date(e.timestamp).toLocaleTimeString() : ''}</span>
            <div class="h-round">${e.round}</div>
            ${e.question ? `<div class="h-q">📤 ${e.question}</div>` : ''}
            ${e.answer ? `<div class="h-a">📥 ${e.answer}</div>` : ''}
          </div>`;
        });
      }
      analysisHtml += `</div></div>`;
    } else {
      analysisHtml = `<div class="card"><div class="card-title">🔍 分析过程日志</div>
        <div class="empty-state"><p>暂无分析日志</p><p style="font-size:12px;color:var(--text-dim);margin-top:4px">执行分析后，每轮对话的提问和回复将显示在这里</p></div>
      </div>`;
    }
  }
  let html = `<div class="page-title">📋 历史日志</div>` + analysisHtml;

  // 项目操作日志
  const opLogs = logs.filter(l=>l.type!=='analysis_log');
  if(opLogs.length > 0){
    html += `<div class="card" style="margin-top:12px"><div class="card-title">📋 操作记录</div>
      <div style="max-height:30vh;overflow-y:auto">`;
    opLogs.slice().reverse().slice(0,30).forEach(l=>{
      html += `<div class="history-entry">
        <span class="h-time">${l.timestamp ? new Date(l.timestamp).toLocaleString() : ''}</span>
        <div>${l.category||l.type||''} ${l.data ? JSON.stringify(l.data).substring(0,100) : ''}</div>
      </div>`;
    });
    html += `</div></div>`;
  }

  main.innerHTML = html;
  const analysisLogCount = _analysisLogEntries.length || logs.filter(l=>l.type==='analysis_log').length;
  side.innerHTML = `<div class="card"><div class="card-title">📖 ${locked.name}</div>
    <div style="font-size:12px;color:var(--text-dim);line-height:1.8">
      <div>🔍 分析日志: ${analysisLogCount}条</div>
      <div>📋 操作记录: ${opLogs.length}条</div>
      <div>📅 分析次数: ${new Set(logs.filter(l=>l.type==='analysis_session_start').map(l=>l.sessionId)).size}次</div>
    </div>
  </div>`;

  // 自动刷新：分析中每2秒检查新日志
  if(window._historyRefreshTimer) clearInterval(window._historyRefreshTimer);
  window._historyRefreshTimer = setInterval(()=>{
    // 只在历史页面可见时刷新
    if(!document.getElementById('page-history')?.classList.contains('active')) return;
    const newCount = _analysisLogEntries.length;
    if(window._lastHistoryCount !== undefined && window._lastHistoryCount !== newCount){
      renderers.history();
    }
    window._lastHistoryCount = newCount;
  }, 2000);
};

        <input type="range" min="50" max="95" step="5" value="${qg.passThreshold}" oninput="document.getElementById('qg_pass_v').textContent=this.value">
        <div style="font-size:11px;color:var(--text-muted);margin-top:2px">太低(&lt;60)：低质量章节也会自动通过。太高(&gt;85)：大部分章节需反复修订。<br><strong>推荐 70-80</strong></div></div>
      <div class="slider-group"><label>修订阈值 <span id="qg_revise_v" style="color:var(--cyan)">${qg.reviseThreshold}</span></label>
        <input type="range" min="30" max="80" step="5" value="${qg.reviseThreshold}" oninput="document.getElementById('qg_revise_v').textContent=this.value">
        <div style="font-size:11px;color:var(--text-muted);margin-top:2px">太低(&lt;40)：即使严重问题也自动修订浪费 API。太高(&gt;60)：轻微问题也触发循环。<br><strong>推荐 45-55</strong></div></div>
      <div class="slider-group"><label>最大迭代 <span id="qg_iter_v" style="color:var(--cyan)">${qg.maxIterations}</span></label>
        <input type="range" min="1" max="10" step="1" value="${qg.maxIterations}" oninput="document.getElementById('qg_iter_v').textContent=this.value">
        <div style="font-size:11px;color:var(--text-muted);margin-top:2px">太少(1-2)：修订不充分。太多(&gt;5)：消耗大量 API 且内容可能偏离原意。<br><strong>推荐 3</strong></div></div>
      <div class="slider-group"><label>严审最低维度分 <span id="qg_min_v" style="color:var(--cyan)">${qg.strictMinDim}</span></label>
        <input type="range" min="1" max="10" step="1" value="${qg.strictMinDim}" oninput="document.getElementById('qg_min_v').textContent=this.value">
        <div style="font-size:11px;color:var(--text-muted);margin-top:2px">严审任一维度低于此分即触发阻断。太低(1-3)：严审约束失效。太高(8-10)：过于严格。<br><strong>推荐 5</strong></div></div>
    </div>
  </details></div>`;

  // 审查权重
  const rw = cfg.reviewWeights;
  html += `<div class="card"><details open><summary style="cursor:pointer;font-size:14px;font-weight:600;color:var(--cyan)">⚖️ 审查权重</summary>
    <p style="font-size:12px;color:var(--text-dim);margin:8px 0">三位审查官在最终加权评分中的权重系数。严审最严格（上限），宽审最宽松（下限），衡审取中间值。</p>
    <div class="grid-3">
      <div class="slider-group"><label>严审 <span id="rw_strict_v" style="color:var(--cyan)">${rw.strict}</span></label>
        <input type="range" min="0.5" max="2" step="0.1" value="${rw.strict}" oninput="document.getElementById('rw_strict_v').textContent=parseFloat(this.value).toFixed(1)">
        <div style="font-size:11px;color:var(--text-muted);margin-top:2px">太低(&lt;0.7)：严审约束效果被削弱。太高(&gt;1.5)：评分整体偏低。<br><strong>推荐 1.0</strong></div></div>
      <div class="slider-group"><label>衡审 <span id="rw_moderate_v" style="color:var(--cyan)">${rw.moderate}</span></label>
        <input type="range" min="0.5" max="2" step="0.1" value="${rw.moderate}" oninput="document.getElementById('rw_moderate_v').textContent=parseFloat(this.value).toFixed(1)">
        <div style="font-size:11px;color:var(--text-muted);margin-top:2px">过低时评分偏向极端，过高时评分过于中庸。<br><strong>推荐 0.7</strong></div></div>
      <div class="slider-group"><label>宽审 <span id="rw_lenient_v" style="color:var(--cyan)">${rw.lenient}</span></label>
        <input type="range" min="0.1" max="1" step="0.1" value="${rw.lenient}" oninput="document.getElementById('rw_lenient_v').textContent=parseFloat(this.value).toFixed(1)">
        <div style="font-size:11px;color:var(--text-muted);margin-top:2px">太低(&lt;0.2)：失去纠偏作用。太高(&gt;0.8)：评分过于宽松。<br><strong>推荐 0.4</strong></div></div>
    </div>
  </details></div>`;

  // 13维度权重
  const DIM_HELPS = [
    '情节结构、转折合理性、因果逻辑。太低：情节问题被低估；太高：轻微瑕疵拉低总分。',
    '角色人设一致性、行为动机、成长弧线。太低：角色OOC被忽略；太高：稍有不足就拉低总分。',
    '对话自然度、角色声音区分度、潜台词。太低：僵硬对话被放过；太高：轻微不自然也被标记。',
    '节奏控制、场景长度、张弛交替。太低：节奏问题被忽视；太高：正常叙事也被判定为问题。',
    '文风、句式变化、比喻新鲜度。太低：文风问题被低估；太高：风格偏好影响客观评分。',
    '时间线、角色细节、世界观规则前后一致性。推荐保持较高权重。',
    '情感共鸣、共情力、是否刻意煽情。太低：情感平淡被放过；太高：正常情感也被认为不够。',
    '原创性、避免陈词滥调、可预测性。太低：套路化内容被高估；太高：对新颖度要求苛刻。',
    '段落长度、句子流畅度、视角清晰度。太低：难读文本也被接受；太高：轻微晦涩也被扣分。',
    'AI 生成痕迹检测敏感度。太低：AI味可能漏检；太高：正常文本也被怀疑为 AI 生成。',
    '角色心理深度和人格一致性。太低：扁平角色被放过；太高：对心理刻画过于严格。',
    '角色间互动逻辑和关系合理性。太低：关系不合理被忽略；太高：正常互动也被质疑。',
    '情节选择的内部逻辑和代价合理性。太低："为了特别而特别"被放过；太高：正常处理也被质疑。',
  ];
  html += `<div class="card"><details open><summary style="cursor:pointer;font-size:14px;font-weight:600;color:var(--cyan)">🔍 13维度权重</summary>
    <p style="font-size:12px;color:var(--text-dim);margin:8px 0">配置 13 个审查维度的权重系数，权重越高该维度在最终评分中影响力越大。1.0 为标准权重。</p>
    <div class="grid-2">`;
  DIM_KEYS.forEach((k,i)=>{
    const w = cfg.dimWeights[k] ?? 1.0;
    html += `<div class="slider-group"><label>${DIM_NAMES[i]} <span id="dw_${k}_v" style="color:var(--cyan)">${w.toFixed(1)}</span></label>
      <input type="range" min="0.5" max="2" step="0.1" value="${w}" oninput="document.getElementById('dw_${k}_v').textContent=parseFloat(this.value).toFixed(1)">
      <div style="font-size:10px;color:var(--text-muted);line-height:1.3;margin-top:1px">${DIM_HELPS[i]}</div></div>`;
  });
  html += `</div></details></div>`;

  html += `<button class="btn btn-primary btn-block" id="btnSaveAllSettings">💾 保存全部配置</button>`;

  // 导出/导入设置（不含 LLM 信息）
  const proj = getProj();
  const hasExport = proj && proj.folders?.config?.settings_export;
  html += `<div style="display:flex;gap:8px;margin-top:12px">
    <button class="btn btn-secondary btn-block" id="btnExportSettings" ${proj?'':'disabled'}>📤 导出设置到项目文件夹</button>
    <button class="btn btn-secondary btn-block" id="btnImportSettings" ${hasExport?'':'disabled'}>📥 从项目文件夹导入设置</button>
  </div>
  <div id="exportImportMsg" style="font-size:12px;color:var(--text-dim);margin-top:6px;text-align:center">
    ${!proj?'⚠️ 需要先锁定一个项目才能导出设置':''}
    ${proj&&!hasExport?'💡 导出后设置将存入项目文件夹，切换项目时可导入复用':''}
    ${hasExport?'✅ 该项目已有已导出的设置，可导入':''}
  </div>`;

  main.innerHTML = html;
  side.innerHTML = `<div class="card"><div class="card-title">ℹ️ 系统信息</div>
    <div style="font-size:12px;color:var(--text-dim);line-height:1.8">
      <div>• 三层审核流程</div>
      <div>• 三审查官（严/衡/宽）</div>
      <div>• 综合评分优选器</div>
      <div>• 模糊记忆引擎</div>
      <div>• 世界树生长模型</div>
      <div>• 张力波动管理器</div>
    </div>
  </div>`;

  // 用 addEventListener 绑定按钮事件（比 onclick 属性更可靠）
  document.getElementById('btnSaveKey')?.addEventListener('click', saveApiKeySetting);
  document.getElementById('btnReenterKey')?.addEventListener('click', reenterApiKeySetting);
  document.getElementById('btnTestConnection')?.addEventListener('click', testConnection);
  document.getElementById('btnExportSettings')?.addEventListener('click', exportSettings);
  document.getElementById('btnImportSettings')?.addEventListener('click', importSettings);
  document.getElementById('btnSaveAllSettings')?.addEventListener('click', saveSettings);
};

// ─── 设置操作函数 ───
function _isApiKeyApplied(provider){
  const st = DB.apiKeyStates;
  return st[provider] === 'applied' && !!_apiKeysCache[provider];
}

function onSetProviderChange(){
  const cfg = DB.config;
  cfg.provider = document.getElementById('setProvider').value;
  const pc = PROVIDER_CONFIG[cfg.provider];
  if(!pc) return;
  // 重新渲染设置页（因为自定义供应商的UI结构不同）
  renderers.settings();
}

function saveApiKeySetting(){
  const prov = document.getElementById('setProvider').value;
  const key = document.getElementById('setApiKey').value.trim();
  if(!key){toast('请输入 API Key','error');return}
  // 加密持久化
  _apiKeysCache[prov] = key;
  _saveApiKeys(_apiKeysCache);
  // 标记为已应用
  if(!DB.apiKeyStates) DB.apiKeyStates = {};
  DB.apiKeyStates[prov] = 'applied';
  saveDB();
  toast('✅ API Key 已加密保存');
  renderers.settings();
}

function reenterApiKeySetting(){
  const prov = document.getElementById('setProvider').value;
  // 清除已保存的 Key
  delete _apiKeysCache[prov];
  _saveApiKeys(_apiKeysCache);
  if(DB.apiKeyStates) DB.apiKeyStates[prov] = 'editing';
  saveDB();
  toast('已清除 API Key，可重新输入');
  renderers.settings();
}

// ═══════ 导出/导入设置 ═══════
function exportSettings(){
  const proj = getProj();
  if(!proj){toast('请先锁定一个项目','error');return}
  // 提取非 LLM 设置
  const cfg = DB.config || {};
  const exportData = {
    qualityGate: JSON.parse(JSON.stringify(cfg.qualityGate || {passThreshold:75,reviseThreshold:50,maxIterations:3,strictMinDim:5})),
    reviewWeights: JSON.parse(JSON.stringify(cfg.reviewWeights || {strict:1.0,moderate:0.7,lenient:0.4})),
    dimWeights: JSON.parse(JSON.stringify(cfg.dimWeights || {})),
    exportedAt: Date.now(),
    version: 1,
  };
  if(!proj.folders) proj.folders = createDefaultFolders();
  if(!proj.folders.config) proj.folders.config = {};
  proj.folders.config.settings_export = exportData;
  saveDB();
  toast('✅ 设置已导出到项目文件夹');
  renderers.settings();
}

function importSettings(){
  const proj = getProj();
  if(!proj || !proj.folders?.config?.settings_export){toast('项目文件夹中无已导出的设置','error');return}
  const data = proj.folders.config.settings_export;
  const cfg = DB.config || {};
  if(!DB.config) DB.config = {};
  if(data.qualityGate) cfg.qualityGate = JSON.parse(JSON.stringify(data.qualityGate));
  if(data.reviewWeights) cfg.reviewWeights = JSON.parse(JSON.stringify(data.reviewWeights));
  if(data.dimWeights) cfg.dimWeights = JSON.parse(JSON.stringify(data.dimWeights));
  saveDB();
  toast('✅ 已从项目文件夹导入设置（LLM 配置保持不变）');
  renderers.settings();
}

async function testConnection(){
  const el = document.getElementById('connectionResult');
  if(!el) return;
  const prov = document.getElementById('setProvider')?.value || 'deepseek';
  const key = _apiKeysCache[prov];
  if(!key){el.innerHTML='<span style="color:var(--accent)">⚠️ 未找到 API Key，请先保存</span>';return;}
  el.innerHTML = '<span style="color:var(--text-dim)">⏳ 正在连接...</span>';
  try{
    const pc = PROVIDER_CONFIG[prov] || PROVIDER_CONFIG.deepseek;
    const baseUrl = prov==='custom' ? (document.getElementById('setCustomUrl')?.value || '') : (pc.base_url || 'https://api.deepseek.com');
    const url = baseUrl.replace(/\/+$/,'') + '/chat/completions';
    const resp = await fetch(url, {
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+key},
      body:JSON.stringify({model:DB.config?.model||'deepseek-v4-flash',messages:[{role:'user',content:'回复"连接成功"四个字'}],max_tokens:50})
    });
    const data = await resp.json();
    if(resp.ok && data.choices){
      el.innerHTML = '<span style="color:var(--green)">✅ 连接成功！模型返回: "' + data.choices[0].message.content + '"</span>';
    } else {
      el.innerHTML = '<span style="color:var(--accent)">❌ 连接失败: ' + (data.error?.message||'HTTP '+resp.status) + '</span>';
    }
  } catch(e){
    el.innerHTML = '<span style="color:var(--accent)">❌ 网络错误: ' + e.message + '</span>';
  }
}

function saveSettings(){
  const cfg = DB.config;
  cfg.provider = document.getElementById('setProvider').value;
  const modelEl = document.getElementById('setModel');
  cfg.model = cfg.provider==='custom' ? (modelEl?.value || '') : modelEl?.value;
  // 从加密存储同步 Key
  const keyInput = document.getElementById('setApiKey');
  if(keyInput && !keyInput.disabled){
    const key = keyInput.value.trim();
    if(key){_apiKeysCache[cfg.provider]=key;_saveApiKeys(_apiKeysCache);}
  }
  // 自定义供应商额外字段
  if(cfg.provider==='custom'){
    cfg.customModel = cfg.model;
    cfg.customUrl = document.getElementById('setCustomUrl')?.value || '';
  }
  cfg.qualityGate.passThreshold = parseInt(document.getElementById('qg_pass_v').textContent);
  cfg.qualityGate.reviseThreshold = parseInt(document.getElementById('qg_revise_v').textContent);
  cfg.qualityGate.maxIterations = parseInt(document.getElementById('qg_iter_v').textContent);
  cfg.qualityGate.strictMinDim = parseInt(document.getElementById('qg_min_v').textContent);
  cfg.reviewWeights.strict = parseFloat(document.getElementById('rw_strict_v').textContent);
  cfg.reviewWeights.moderate = parseFloat(document.getElementById('rw_moderate_v').textContent);
  cfg.reviewWeights.lenient = parseFloat(document.getElementById('rw_lenient_v').textContent);
  ['writer','strict','moderate','lenient','voter','skill'].forEach(rk=>{
    const elM = document.getElementById('rp_'+rk+'_model');
    const elT = document.getElementById('rp_'+rk+'_temp_v');
    if(elM) cfg.roleParams[rk] = {model:elM.value, temperature:parseFloat(elT?.textContent||0.5)};
  });
  DIM_KEYS.forEach(k=>{
    const el = document.getElementById('dw_'+k+'_v');
    if(el) cfg.dimWeights[k] = parseFloat(el.textContent);
  });
  saveDB();
  toast('✅ 全部配置已保存');
}

// ═══════ 初始化 ═══════
document.querySelectorAll('.lang-btn').forEach(b=>{
  b.addEventListener('click',()=>setLang(b.dataset.lang));
});

// ═══════ 服务器状态检测 ═══════
let _serverOnline = false;
async function checkServerNow(){
  const dot = document.getElementById('serverDot');
  const text = document.getElementById('serverText');
  dot.style.background = '#FFA500'; text.textContent = '检测中...';
  try {
    const resp = await fetch('http://127.0.0.1:8899/api/health', {cache:'no-store'});
    if(resp.ok){
      _serverOnline = true;
      dot.style.background = '#00C853';
      text.textContent = '服务器在线';
      text.style.color = 'var(--green)';
    } else {
      throw new Error();
    }
  } catch(e){
    _serverOnline = false;
    dot.style.background = '#FF1744';
    text.innerHTML = '服务器离线 - <span style="color:var(--accent);text-decoration:underline">点击查看帮助</span>';
    text.style.color = 'var(--text-dim)';
    // 弹出提示
    const helpMsg = '<h3>🚀 服务器未启动</h3><p style="font-size:14px;color:var(--text-dim);margin:12px 0">需要先启动本地服务器才能使用全部功能。</p><div style="background:rgba(0,0,0,.3);padding:12px;border-radius:6px;font-family:monospace;font-size:13px;line-height:1.8">方法1：双击项目文件夹中的 <b>start_server.bat</b><br><br>方法2：在终端运行：<br>.venv\\Scripts\\python server.py</div><p style="font-size:13px;color:var(--text-dim);margin:12px 0">启动后刷新页面即可。</p>';
    showModal(helpMsg, [{text:'知道了',cls:'btn-primary',fn:closeModal}]);
  }
}
// 每15秒检测一次
checkServerNow();
setInterval(checkServerNow, 15000);

// 加载数据（磁盘主存储 → localStorage 缓存）
initApp().then(() => {
  updateLockBadge();
  navigateTo('project');
});
</script>
