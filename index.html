<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>超逸写手 — Art Super Writer</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<style>
/* ═══════ 全局 ═══════ */
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0d0d1a;--bg2:#14142a;--bg3:#1c1c3a;
  --text:#e0e0e8;--text-dim:#8888aa;--text-muted:#555577;
  --accent:#e94560;--cyan:#00d4ff;--purple:#a29bfe;
  --green:#2ed573;--orange:#ff9f43;--yellow:#ffd32a;
  --border:#2a2a4a;--radius:8px;
  --sidebar-w:200px;
}
html,body{height:100%;font-family:'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);overflow:hidden}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

/* ═══════ 顶部标题栏 ═══════ */
#header{
  height:72px;display:flex;align-items:center;justify-content:center;
  background:linear-gradient(135deg,var(--bg2),var(--bg3));
  border-bottom:1px solid var(--border);position:relative;
  flex-shrink:0;
}
#header .title{
  font-size:28px;font-weight:700;letter-spacing:6px;
  background:linear-gradient(90deg,var(--cyan),var(--purple),var(--accent));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  text-align:center;line-height:1.3;
}
#header .title .en{
  display:block;font-size:13px;font-weight:400;letter-spacing:3px;
  -webkit-text-fill-color:var(--text-dim);margin-top:2px;
}
#header .lang-group{position:absolute;right:16px;top:50%;transform:translateY(-50%);display:flex;gap:4px}
#header .lang-btn{
  padding:4px 10px;border-radius:4px;border:1px solid var(--border);
  background:transparent;color:var(--text-dim);cursor:pointer;font-size:12px;
  transition:all .15s;
}
#header .lang-btn:hover{color:var(--text);border-color:var(--text-muted)}
#header .lang-btn.active{background:rgba(0,212,255,.1);color:var(--cyan);border-color:var(--cyan)}

/* ═══════ 主体：左中右三栏 ═══════ */
#body{display:flex;height:calc(100vh - 72px);overflow:hidden}

/* ─── 左侧导航 ─── */
#sidebar{
  width:var(--sidebar-w);min-width:var(--sidebar-w);
  background:var(--bg2);border-right:1px solid var(--border);
  display:flex;flex-direction:column;padding:8px;
  overflow-y:auto;flex-shrink:0;
}
#sidebar .nav-btn{
  display:flex;align-items:center;gap:8px;
  padding:10px 12px;border-radius:6px;border:none;
  background:transparent;color:var(--text-dim);cursor:pointer;
  font-size:13px;transition:all .15s;text-align:left;width:100%;
}
#sidebar .nav-btn:hover{background:rgba(255,255,255,.04);color:var(--text)}
#sidebar .nav-btn.active{background:rgba(0,212,255,.08);color:var(--cyan)}
#sidebar .nav-btn .icon{font-size:16px;width:20px;text-align:center}
#sidebar .nav-divider{height:1px;background:var(--border);margin:6px 8px}

/* ─── 中间 + 右侧面板（可拖拽分隔） ─── */
#panels{display:flex;flex:1;overflow:hidden}
.panel{overflow-y:auto;padding:16px;height:100%}
#panel-main{flex:1;min-width:300px}
#panel-side{width:200px;min-width:180px;border-left:1px solid var(--border);flex-shrink:0}

/* 拖拽分隔条 */
.splitter{
  width:4px;cursor:col-resize;background:transparent;
  flex-shrink:0;position:relative;transition:background .15s;
}
.splitter:hover,.splitter.active{background:var(--cyan)}

/* ═══════ 页面容器（切换用） ═══════ */
.page{display:none}
.page.active{display:block}

/* ═══════ 通用组件 ═══════ */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px}
.card-title{font-size:14px;font-weight:600;margin-bottom:8px;color:var(--cyan)}
.page-title{font-size:20px;font-weight:700;margin-bottom:16px}
.empty-state{padding:40px 20px;text-align:center;color:var(--text-dim)}
.btn{padding:7px 18px;border-radius:6px;border:none;cursor:pointer;font-size:13px;transition:all .15s;display:inline-flex;align-items:center;gap:4px}
.btn-primary{background:linear-gradient(135deg,var(--cyan),var(--purple));color:#fff}
.btn-primary:hover{filter:brightness(1.1)}
.btn-secondary{background:rgba(255,255,255,.06);color:var(--text)}
.btn-secondary:hover{background:rgba(255,255,255,.1)}
.btn-sm{padding:4px 10px;font-size:11px}
.btn-block{display:block;width:100%;text-align:center}
.btn-danger{background:var(--accent);color:#fff}
.btn-danger:hover{filter:brightness(1.1)}
.btn-warning{background:var(--orange);color:#fff}
.btn-warning:hover{filter:brightness(1.1)}
.btn-success{background:var(--green);color:#fff}
.btn-success:hover{filter:brightness(1.1)}
.sep{border:none;border-top:1px solid var(--border);margin:12px 0}

/* 项目列表 */
.proj-item{display:flex;justify-content:space-between;align-items:center;padding:10px 12px;margin-bottom:4px;border-radius:6px;cursor:pointer;transition:all .15s;border:1px solid transparent}
.proj-item:hover{background:rgba(255,255,255,.04);border-color:var(--border)}
.proj-item.active{background:rgba(0,212,255,.06);border-color:var(--cyan)}
.proj-name{font-weight:600;font-size:14px}
.proj-meta{font-size:11px;color:var(--text-dim);margin-top:2px}
.proj-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.grid-2{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.row{display:flex;flex-wrap:wrap}
.col{flex:1;min-width:0}
.stat{text-align:center;padding:10px;background:rgba(255,255,255,.03);border-radius:6px}
.stat-v{font-size:20px;font-weight:700}
.tag{padding:2px 8px;border-radius:10px;font-size:11px;display:inline-block}
.tag-green{background:rgba(46,213,115,.15);color:var(--green)}
.tag-yellow{background:rgba(255,211,42,.15);color:var(--yellow)}
.tag-blue{background:rgba(0,212,255,.15);color:var(--cyan)}

/* 模态对话框 */
.modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.6);z-index:999;align-items:center;justify-content:center}
.modal-overlay.show{display:flex}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:24px;max-width:520px;width:90%;max-height:80vh;overflow-y:auto}
.modal h3{margin-bottom:12px}
.modal .btn-group{margin-top:16px;display:flex;gap:8px;justify-content:flex-end}

/* Toast 通知 */
.toast-container{position:fixed;bottom:20px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:8px}
.toast{padding:10px 18px;border-radius:8px;font-size:13px;color:#fff;animation:slideIn .3s ease}
.toast-success{background:var(--green)}
.toast-error{background:var(--accent)}
.toast-info{background:var(--cyan);color:var(--bg)}
@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}

/* 历史日志样式 */
.history-entry{padding:8px 0;border-bottom:1px solid rgba(255,255,255,.04);font-size:12px;line-height:1.6}
.history-entry .h-round{color:var(--orange);font-weight:600;font-size:13px}
.history-entry .h-q{color:var(--text-dim);margin:2px 0}
.history-entry .h-a{color:#c8d6e5;margin:4px 0 4px 12px;white-space:pre-wrap;font-size:12px}
.history-entry .h-time{font-size:10px;color:var(--text-muted)}
</style>

<script>
// ═══════ 语言 ═══════
let lang = localStorage.getItem('asw_lang') || 'zh';
const L = {
  'creative':'🎨 创作台','creative.en':'🎨 Creative Desk',
  'project':'📁 项目管理','project.en':'📁 Project',
  'writer':'✍️ 写作台','writer.en':'✍️ Writer',
  'review':'🔍 审查室','review.en':'🔍 Review',
  'worldtree':'🌳 世界树','worldtree.en':'🌳 World Tree',
  'characters':'🧠 角色池','characters.en':'🧠 Characters',
  'tension':'📊 节奏控制台','tension.en':'📊 Rhythm',
  'settings':'⚙️ 设置','settings.en':'⚙️ Settings',
  'history':'📋 历史日志','history.en':'📋 History',
  'welcome':'欢迎使用 Art Super Writer','welcome.en':'Welcome to Art Super Writer',
  'welcome_desc':'请从左侧选择一个功能开始','welcome_desc.en':'Select a tool from the left to start',
  'no_data':'暂无数据','no_data.en':'No data',
};
function T(k){const e=L[k+'.'+lang]||L[k];return e||k}
function setLang(l){lang=l;localStorage.setItem('asw_lang',l);
  document.querySelectorAll('.lang-btn').forEach(b=>b.classList.toggle('active',b.dataset.lang===l));
  // 刷新导航文字
  document.querySelectorAll('.nav-btn').forEach(b=>{
    const key = b.dataset.page;
    const icon = b.querySelector('.icon')?.outerHTML||'';
    b.innerHTML = icon + ' ' + T(key).replace(/^[^\s]+\s/,'');
  });
  renderCurrentPage();
}

// ═══════ 数据管理 ═══════
// DB = 内存缓存；磁盘（服务器）是主存储；localStorage 是本地缓存

const DB = {projects:{}, currentProject:'', lockedProject:''};

function createDefaultFolders(){
  return {
    chapters: [], drafts: [], reviews: [], reviewHistory: {},
    worldTreeData: {}, characterProfiles: {}, characterAnalysis: {},
    tensionReports: {}, config: {}, projectLog: [],
    fuzzyMemory: {}, skills: {external:[], self:[]}, styleMemory: {}, referenceNotes: [],
  };
}

/** 启动时加载数据：先尝试从服务器加载，再 fallback 到 localStorage */
async function initApp(){
  let loadedFromServer = false;
  try {
    // 1. 从服务器获取项目列表
    const resp = await fetch('http://127.0.0.1:8899/api/projects');
    const data = await resp.json();
    if(data.projects && data.projects.length){
      loadedFromServer = true;
      for(const name of data.projects){
        // 2. 从服务器加载每个项目的元数据
        let meta = null;
        try {
          const mr = await fetch('http://127.0.0.1:8899/api/project/meta?project='+encodeURIComponent(name));
          if(mr.ok) meta = await mr.json();
        } catch(e){}
        if(meta && meta.name){
          DB.projects[name] = Object.assign(createProjectData(name, meta), meta);
        } else {
          DB.projects[name] = createProjectData(name, {});
          DB.projects[name].imported = true;
        }
      }
      // 3. 对已导入的项目，检查磁盘是否有章节文件
      for(const name of data.projects){
        const p = DB.projects[name];
        if(p && p.imported && (!p.folders?.chapters?.length)){
          try {
            const files = await listDiskFiles(name, 'chapters');
            if(files && files.length){
              p.folders.chapters = files.map(f => ({file: f, source: ''}));
            }
          } catch(e){}
        }
      }
    }
  } catch(e){ /* 服务器不在线 */ }

  // 3. 从磁盘读取锁定状态（优先），localStorage 为后备
  try {
    const resp = await fetch('http://127.0.0.1:8899/api/lock/read');
    const lockData = await resp.json();
    if(lockData.locked) DB.lockedProject = lockData.locked;
  } catch(e){
    // 服务器不在线，从 localStorage 恢复
    function _loadMeta(key){
      try {
        const d = localStorage.getItem(key);
        if(!d) return null;
        return JSON.parse(d);
      } catch(e){ return null; }
    }
    const meta = _loadMeta('asw_db') || _loadMeta('asw_meta');
    if(meta){
      if(meta.currentProject && !DB.currentProject) DB.currentProject = meta.currentProject;
      if(meta.lockedProject) DB.lockedProject = meta.lockedProject;
      if(meta.apiKeyStates) DB.apiKeyStates = meta.apiKeyStates;
    }
  }

  // 4. 确保所有项目都有 folders 结构
  Object.values(DB.projects).forEach(p => {
    if(!p.folders) p.folders = createDefaultFolders();
  });

  // 5. 验证锁定/当前项目是否真实存在，不存在则清除
  const projNames = Object.keys(DB.projects);
  if(DB.lockedProject && !DB.projects[DB.lockedProject]) DB.lockedProject = null;
  if(DB.currentProject && !DB.projects[DB.currentProject]) DB.currentProject = null;
  if(!DB.currentProject && projNames.length){
    DB.currentProject = projNames[0];
  }

  // 6. 尝试从磁盘加载当前项目/锁定项目的完整分析数据
  const syncTargets = [];
  if(DB.lockedProject && DB.projects[DB.lockedProject]) syncTargets.push(DB.lockedProject);
  if(DB.currentProject && DB.projects[DB.currentProject] && !syncTargets.includes(DB.currentProject)) syncTargets.push(DB.currentProject);
  if(syncTargets.length){
    Promise.all(syncTargets.map(name =>
      syncProjectFromDisk(name)
    )).then(results => {
      if(results.some(r => r)) renderCurrentPage();
    });
  }

  // 7. 如果服务器不在线且无任何项目，从localStorage恢复项目名列表
  if(!projNames.length){
    const meta = _loadMeta('asw_meta');
    if(meta && meta.projectNames && meta.projectNames.length){
      meta.projectNames.forEach(name => {
        if(!DB.projects[name]){
          DB.projects[name] = createProjectData(name, {});
          DB.projects[name].imported = true;
        }
      });
      if(!DB.currentProject) DB.currentProject = meta.projectNames[0];
    }
  }

  renderCurrentPage();
}

/** 保存：写磁盘（主）+ localStorage（仅存元数据，不存项目数据） */
function saveDB(){
  // 异步写磁盘（不阻塞 UI）
  const proj = DB.currentProject ? DB.projects[DB.currentProject] : null;
  if(proj) syncProjectMeta(DB.currentProject);
  // ★ 保存审查状态（_lastReview/_reviewHistory/qualityHistory/continuity）
  const locked = getLockedProject();
  if(locked) saveReviewStateSync(locked.name);
  // 写 localStorage 仅存元数据
  try {
    localStorage.setItem('asw_meta', JSON.stringify({
      currentProject: DB.currentProject,
      lockedProject: DB.lockedProject,
      apiKeyStates: DB.apiKeyStates||{},
      projectNames: Object.keys(DB.projects)
    }));
  } catch(e){}
}

/** 将项目元数据同步到服务器的 project.json */
async function syncProjectMeta(projectName){
  const p = DB.projects[projectName];
  if(!p) return;
  try {
    // 只保存元数据，不保存大块章节内容
    const metaData = {
      name: p.name,
      premise: p.premise || '',
      genre: p.genre || '未知',
      createdAt: p.createdAt || Date.now(),
      imported: !!p.imported,
      analyzed: !!p.analyzed,
      analysisCount: p.analysisCount || 0,
      chapters: (p.chapters||[]).map(c => ({
        number: c.number,
        status: c.status || 'draft',
        wordCount: c.wordCount || 0,
        created_at: c.created_at || ''
      })),
      characters: p.characters ? Object.keys(p.characters).length : 0,
      config: p.config || {},
    };
    await fetch('http://127.0.0.1:8899/api/project/meta', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({project: projectName, action: 'save', data: metaData})
    });
  } catch(e){}
}

/** 从磁盘加载章节列表到 p.chapters，同时更新 p.folders.chapters 记录所有文件 */
async function loadChaptersFromDisk(projectName){
  const p = DB.projects[projectName];
  if(!p) return;
  const files = await listDiskFiles(projectName, 'chapters');
  if(!files || !files.length) return false;

  // 更新 folders.chapters：记录所有文件（供分析时读取）
  p.folders.chapters = files.map(f => ({file: f, source: ''}));

  // 加载 chapter_XXX.md 到 p.chapters
  const chFiles = files.filter(f=>/^chapter_\d{3}\.md$/.test(f)).sort();
  if(chFiles.length > 0){
    p.chapters = [];
    for(const fname of chFiles){
      const content = await readFileFromDisk(projectName, 'chapters', fname);
      if(content){
        const num = parseInt(fname.match(/\d+/)[0]);
        p.chapters.push({number:num, content, status:'approved', created_at:''});
      }
    }
    p.chapters.sort((a,b)=>a.number-b.number);
    return true;
  }
  return false;
}

// ═══════ API Key 加密持久化 ═══════
function _getMachineFingerprint(){
  let s = '';
  try{s += navigator.userAgent + '|' + screen.width + 'x' + screen.height + '|ASR_WRITER_SALT_2026';}catch(e){s='default_fingerprint_2026';}
  return s;
}
function _encryptApiKey(plain){
  if(!plain) return '';
  const fp = _getMachineFingerprint();
  let r = '';
  for(let i=0;i<plain.length;i++){
    const c = plain.charCodeAt(i) ^ fp.charCodeAt(i % fp.length);
    r += String.fromCharCode(c);
  }
  return btoa(r);
}
function _decryptApiKey(cipher){
  if(!cipher) return '';
  try{
    const fp = _getMachineFingerprint();
    const r = atob(cipher);
    let p = '';
    for(let i=0;i<r.length;i++){
      p += String.fromCharCode(r.charCodeAt(i) ^ fp.charCodeAt(i % fp.length));
    }
    return p;
  }catch(e){return '';}
}
function _loadApiKeys(){
  try{
    const d = localStorage.getItem('asw_db_apikeys');
    if(d){const p=JSON.parse(d);const r={};for(const k in p)r[k]=_decryptApiKey(p[k]);return r;}
  }catch(e){}
  // 尝试从磁盘加载
  return {};
}
function _saveApiKeys(keys){
  const e = {};
  for(const k in keys) if(keys[k]) e[k] = _encryptApiKey(keys[k]);

// ═══════ 拖拽分隔条 ═══════
(function(){
  const splitter = document.getElementById('splitter');
  const main = document.getElementById('panel-main');
  const side = document.getElementById('panel-side');
  let dragging = false;
  
  splitter.addEventListener('mousedown',(e)=>{
    dragging=true;splitter.classList.add('active');
    main.style.flex = 'none';
    e.preventDefault();
  });
  
  document.addEventListener('mousemove',(e)=>{
    if(!dragging)return;
    const panels = document.getElementById('panels');
    const rect = panels.getBoundingClientRect();
    const totalW = rect.width;
    const splitterW = 4;
    let mainW = e.clientX - rect.left - splitterW/2;
    const sideW = Math.max(180, Math.min(400, rect.right - e.clientX - splitterW/2));
    mainW = totalW - sideW - splitterW;
    mainW = Math.max(300, mainW);
    main.style.width = mainW + 'px';
    side.style.width = (totalW - mainW - splitterW) + 'px';
  });
  
  document.addEventListener('mouseup',()=>{
    if(!dragging)return;
    dragging=false;splitter.classList.remove('active');
  });
})();

    method:'POST',headers:{'Content-Type':'application/json'},

}

/** 尝试加载指定章节的已保存方向文本（同时兼容 writer_direction 和 writer_prompt 两种文件名） */
async function loadDirectionForChapter(projectName, chNum){
  const padded = String(chNum).padStart(3,'0');
  // 优先新文件名 writer_direction，回退旧文件名 writer_prompt
  const names = ['writer_direction_第'+padded+'章.json', 'writer_prompt_第'+padded+'章.json'];
  for(const fname of names){
    const saved = await readFileFromDiskLatest(projectName, 'projectLog', fname);
    if(saved){
      try {
        const data = JSON.parse(saved);
        if(data.direction){
          document.getElementById('writerDirection').value = data.direction;
          return;
        }
      } catch(e){}
    }
  }
  document.getElementById('writerDirection').value = '';
}

/** 加载草稿内容到写作台文本框（仅当该章节未定稿时） */
async function loadWriterDraft(projectName, chNum){
  const p = DB.projects[projectName];
  if(!p) return;
  // 已定稿的章节不加载草稿
  if(p.chapters?.some(c=>c.number===chNum)) return;
  const padded = String(chNum).padStart(3,'0');
  const draftContent = await readFileFromDisk(projectName, 'drafts', `draft_第${padded}章.md`);
  if(draftContent){
    const el = document.getElementById('writerContent');
    const result = document.getElementById('writerResult');
    if(el){ el.value = draftContent; }
    if(result){ result.style.display = 'block'; }
  }
}

/** 切页时保存写作台未保存的内容到草稿，防止切换页面后丢失 */
function savePendingWriterContent(){
  const el = document.getElementById('writerContent');
  if(!el || !el.value.trim()) return;
  const locked = getLockedProject();
  if(!locked) return;
  const chNum = parseInt(document.getElementById('writerChNum')?.value);
  if(!chNum) return;
  const content = el.value.trim();
  const p = DB.projects[locked.name];
  if(!p) return;
  if(!p.drafts) p.drafts = [];
  const existing = p.drafts.findIndex(d=>d.number===chNum);
  const draftData = {number:chNum, content, status:'draft', title:'', created_at:new Date().toISOString()};
  if(existing>=0) p.drafts[existing] = {...p.drafts[existing], ...draftData};
  else p.drafts.push(draftData);
  p.drafts.sort((a,b)=>a.number-b.number);
  saveFileToDisk(locked.name, 'drafts', `draft_第${String(chNum).padStart(3,'0')}章.md`, content);
  console.log(`📄 切页时自动保存第${chNum}章`);
}

/** 带版本号的保存：保存到 subfolder/v{version}/filename，不覆盖旧文件 */
function saveFileToDiskV(project, subfolder, filename, content, version){
  saveFileToDisk(project, subfolder + '/v' + version, filename, content);
}

/** 从版本化文件夹读取最新版本的文件，无版本时回退到 subfolder/filename */
async function readFileFromDiskLatest(projectName, subfolder, filename){
  const p = DB.projects[projectName];
  const maxV = p?.analysisCount || 0;
  // 从高到低尝试版本文件夹
  for(let v = maxV; v >= 1; v--){
    const content = await readFileFromDisk(projectName, subfolder + '/v' + v, filename);
    if(content) return content;
  }
  // 回退到非版本化路径
  return await readFileFromDisk(projectName, subfolder, filename);
}

async function readFileFromDisk(project, subfolder, filename){
  try {
    const resp = await fetch('http://127.0.0.1:8899/api/project/read-file', {
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({project, folder:subfolder, filename})
    });
    const data = await resp.json();
    if(resp.ok && data.content) return data.content;
    return null;
  } catch(e){ return null; }
}

async function listDiskFiles(project, subfolder){
  try {
    const resp = await fetch('http://127.0.0.1:8899/api/project/list-files', {
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({project, folder:subfolder})
    });
    const data = await resp.json();
    if(resp.ok && data.files) return data.files;
    return [];
  } catch(e){ return []; }
}

/** 从磁盘读取章节列表到 p.chapters */
/** 根据章节标记文件 chapter_marks.json 分割全文为独立章节文件（供手动测试用） */
async function splitChaptersByMarks(projectName){
  const p = DB.projects[projectName];
  if(!p){ toast('项目不存在','error'); return; }
  const marksRaw = await readFileFromDisk(projectName, 'chapters', 'chapter_marks.json');
  if(!marksRaw){ toast('未找到章节标记文件，请先执行分析','error'); return; }
  let chMarks;
  try { chMarks = JSON.parse(marksRaw); } catch(e){ toast('章节标记文件格式错误','error'); return; }
  if(!chMarks || chMarks.length < 2){ toast('章节标记不足，无法分割','error'); return; }
  // 读取全文
  let fullText = '';
  fullText = await readFileFromDisk(projectName, 'chapters', 'full_text.md');
  if(!fullText){
    const files = await listDiskFiles(projectName, 'chapters');
    // 优先找导入的原始文件（最大的.md文件）
    const mdFiles = files.filter(f=>f.endsWith('.md') && !f.startsWith('chapter_') && !f.startsWith('part_') && f !== 'full_text.md' && f !== 'chapter_marks.json');
    for(const f of mdFiles){
      const content = await readFileFromDisk(projectName, 'chapters', f);
      if(content && content.length > 100){ fullText = content; break; }
    }
    if(!fullText){
      const partFiles = files.filter(f=>/^part_\d{3}\.md$/.test(f)).sort();
      for(const f of partFiles){
        const part = await readFileFromDisk(projectName, 'chapters', f);
        if(part) fullText += part + '\n\n';
      }
    }
  }
  if(!fullText || fullText.length < 50){ toast('未找到全文内容','error'); return; }
  // 匹配+分割（去标点前15字匹配）
  function norm(t){
    return t.replace(/[\uff01-\uff5e]/g,c=>String.fromCharCode(c.charCodeAt(0)-0xfee0))
            .replace(/\u3000/g,' ')
            .replace(/[\s\n\r【】《》「」『』（）\[\]""''，。、；：？！·—…\.,;:!?'"\(\)\[\]]/g,'');
  }
  function normKeepLen(t){ return t.replace(/[\uff01-\uff5e]/g,c=>String.fromCharCode(c.charCodeAt(0)-0xfee0)).replace(/\u3000/g,' '); }
  const n1Full = normKeepLen(fullText);        // 等长，索引与原文一致
  const n2Full = norm(n1Full);                 // 去标点，更短
  let searchFrom = 0;
  const found = [];
  for(let i=0; i<chMarks.length; i++){
    const cm = chMarks[i];
    const n1Open = normKeepLen(cm.openText);
    let idx = -1;
    // 方式1：等长精确匹配
    idx = n1Full.indexOf(n1Open, searchFrom);
    // 方式2：去标点匹配（需换算索引）
    if(idx < 0){
      const n2Open = norm(n1Open).replace(/[\s]/g,'').substring(0,15);
      if(n2Open.length >= 3){
        const bIdx = n2Full.indexOf(n2Open);
        if(bIdx >= 0){
          let cnt = 0;
          for(let j=0; j<n1Full.length; j++){
            if(!/[\s\n\r【】《》「」『』（）\[\]""''，。、；：？！·—…\.,;:!?'"\(\)\[\]]/.test(n1Full[j])) cnt++;
            if(cnt > bIdx){ idx = j; break; }
          }
        }
      }
    }
    if(idx >= 0 && idx >= searchFrom){
      found.push({idx, cm});
      searchFrom = idx + 1;
    }
  }
  if(found.length >= 2){
    p.chapters = [];
    p.folders.chapters = p.folders.chapters.filter(f=>!f.file || !/^chapter_\d{3}\.md$/.test(f.file));
    for(let i=0; i<found.length; i++){
      const start = found[i].idx;
      const end = i+1 < found.length ? found[i+1].idx : fullText.length;
      const content = fullText.substring(start, end).trim();
      const cm = found[i].cm;
      if(content.length > 50){
        p.chapters.push({number:cm.number, title:cm.title, content, status:'draft', created_at:new Date().toISOString()});
        const fname = 'chapter_'+String(cm.number).padStart(3,'0')+'.md';
        p.folders.chapters.push({file:fname, content});
        saveFileToDisk(projectName, 'chapters', fname, content);
      }
    }
    toast(`✅ 已分割为 ${p.chapters.length} 章`);
    if(getLockedProject()?.name === projectName) renderers.writer();
  } else {
    toast('匹配失败：部分章节在原文中未找到对应位置','error');
  }
}

/** 从磁盘读取节奏数据到 p.rhythm 和 p.tensions（取最新版本） */

      p.tensions = (rhythm.per_chapter||[]).map(c=>({

        phase:c.role||'未知'
      }));
      return true;
    } catch(e){}
  }
  return false;
}

/** 同步：从磁盘加载项目的所有分析数据到内存 */
async function syncProjectFromDisk(projectName){
  const p = DB.projects[projectName];
  if(!p) return false;
  let loaded = false;
  if(await loadChaptersFromDisk(projectName)) loaded = true;
  if(await loadWorldTreeFromDisk(projectName)) loaded = true;
  if(await loadRhythmFromDisk(projectName)) loaded = true;
  if(await loadCharactersFromDisk(projectName)) loaded = true;
  if(await loadReaderDataFromDisk(projectName)) loaded = true;
  await loadProjectLogFromDisk(projectName);
  // ★ 加载审查状态（审查历史/最后一次审查/连续性指标）
  await loadReviewState(projectName);
  // ★ 加载故事状态（角色位置/情节线/伏笔/时间线）
  await loadStoryState(projectName);
  if(loaded) p.analyzed = true;
  return loaded;
}

function saveProjectFilesToDisk(projectName, version){
  const p = DB.projects[projectName];
  if(!p) return;
  // 章节（不版本化，用户内容）
  (p.chapters||[]).forEach(ch=>{
    saveFileToDisk(projectName, 'chapters', `chapter_${String(ch.number).padStart(3,'0')}.md`, ch.content);
  });
  // 以下分析结果写入版本子文件夹
  const v = version ? ('/v' + version) : '';
  // 世界树数据（JSON + 报告）
  if(p.worldTree){
    saveFileToDisk(projectName, 'worldTreeData' + v, 'world_tree.json', p.worldTree);
  }
  // 角色池数据（JSON + 档案）
  if(p.characters && Object.keys(p.characters).length > 0){
    saveFileToDisk(projectName, 'characterProfiles' + v, 'characters.json', p.characters);
    Object.entries(p.characters).forEach(([cid, ch])=>{
      if(ch.name) saveFileToDisk(projectName, 'characterProfiles' + v, `${ch.name}_档案.md`,
        `# ${ch.name}\n\n角色定位: ${ch.role||'未知'}\n\n${ch.behavioral_model||''}`);
    });
  }
  // 节奏数据（JSON + 报告）
  if(p.rhythm) saveFileToDisk(projectName, 'tensionReports' + v, 'rhythm.json', p.rhythm);
  if(p.rhythm || p.readerData?.rhythm){
    const r = p.rhythm || p.readerData?.rhythm;
    saveFileToDisk(projectName, 'tensionReports' + v, '读者节奏报告.md', `# 读者节奏报告\n\n${JSON.stringify(r, null, 2)}`);
  }
  // 模糊记忆
  if(p.folders?.fuzzyMemory){
    Object.entries(p.folders.fuzzyMemory).forEach(([fname, content])=>{
      saveFileToDisk(projectName, 'fuzzyMemory' + v, fname, content);
    });
  }
  // 项目日志
  if(p.folders?.projectLog?.length){
    saveFileToDisk(projectName, 'projectLog' + v, 'project_log.json', p.folders.projectLog);
  }
  // 分析日志
  if(_analysisLogEntries.length > 0){
    saveFileToDisk(projectName, 'projectLog' + v, 'analysis_log.json', _analysisLogEntries);
  }
  // 写作技能评价
  const sk = p.folders?.skills;
  if(sk?.self?.length){
    sk.self.forEach((content, i)=>{
      saveFileToDisk(projectName, 'skills/self' + v, `skill_${i+1}.md`, content);
    });
  }
  if(sk?.external?.length){
    sk.external.forEach((content, i)=>{
      saveFileToDisk(projectName, 'skills/external' + v, `external_${i+1}.md`, content);
    });
  }
}

// ─── 审查状态持久化（刷新不丢失） ───
// 同步版：立即写 localStorage，异步写磁盘
function saveReviewStateSync(projectName){
  const p = DB.projects[projectName];
  if(!p) return;
  const state = {
    _lastReview: p._lastReview || null,
    _reviewHistory: p._reviewHistory || {},
    qualityHistory: p.qualityHistory || [],
    continuity: p.continuity || null,
    _reviewSelectedCh: p._reviewSelectedCh || null,
    savedAt: Date.now(),
  };
  // localStorage 同步写入（即时生效）
  try {
    localStorage.setItem('asw_review_'+projectName, JSON.stringify(state));
  } catch(e){}
  // 磁盘异步写入
  saveFileToDisk(projectName, 'config', 'review_state.json', state);
}

async function saveReviewState(projectName){
  const p = DB.projects[projectName];
  if(!p) return;
  const state = {
    _lastReview: p._lastReview || null,
    _reviewHistory: p._reviewHistory || {},
    qualityHistory: p.qualityHistory || [],
    continuity: p.continuity || null,
    _reviewSelectedCh: p._reviewSelectedCh || null,
    savedAt: Date.now(),
  };
  // 写磁盘（主存储）
  saveFileToDisk(projectName, 'config', 'review_state.json', state);
  // 写 localStorage（备份，服务器离线时使用）
  try {
    localStorage.setItem('asw_review_'+projectName, JSON.stringify(state));
  } catch(e){}
}

async function loadReviewState(projectName){
  const p = DB.projects[projectName];
  if(!p) return;
  let loaded = false;
  // 优先从磁盘加载
  const content = await readFileFromDisk(projectName, 'config', 'review_state.json');
  if(content){
    try {
      const state = JSON.parse(content);
      if(state._lastReview) p._lastReview = state._lastReview;
      if(state._reviewHistory) p._reviewHistory = state._reviewHistory;
      if(state.qualityHistory) p.qualityHistory = state.qualityHistory;
      if(state.continuity) p.continuity = state.continuity;
      if(state._reviewSelectedCh) p._reviewSelectedCh = state._reviewSelectedCh;
      loaded = true;
    } catch(e){}
  }
  // 磁盘无数据时回退到 localStorage
  if(!loaded){
    try {
      const backup = localStorage.getItem('asw_review_'+projectName);
      if(backup){
        const state = JSON.parse(backup);
        if(state._lastReview) p._lastReview = state._lastReview;
        if(state._reviewHistory) p._reviewHistory = state._reviewHistory;
        if(state.qualityHistory) p.qualityHistory = state.qualityHistory;
        if(state.continuity) p.continuity = state.continuity;
      }
    } catch(e){}
  }
}

async function createProject(){
  const name = document.getElementById('newProjName').value.trim();
  if(!name){alert('请输入项目名称');return}
  if(DB.projects[name]){alert('项目已存在');return}
  DB.projects[name]=createProjectData(name, {
    premise:document.getElementById('newProjPremise').value.trim(),
    genre:document.getElementById('newProjGenre').value
  });
  DB.currentProject=name;
  // 创建磁盘文件夹并同步元数据（必须等待磁盘操作完成）

  await syncProjectMeta(name);

}

function importNovel(){
  const files = document.getElementById('importFile').files;
  if(!files||files.length===0){alert('请选择文件');return}
  let imported = 0;
  let lastName = '';
  for(let i=0;i<files.length;i++){
    const f = files[i];
    const fileName = f.name;
    const reader = new FileReader();
    reader.onload = (function(projName, fname){
      return async function(e){
        const rawBytes = new Uint8Array(e.target.result);

        if(DB.projects[projName]){ imported++; if(imported===files.length){ DB.currentProject=lastName||projName; saveDB(); renderers.project(); } return; }
        const projData = createProjectData(projName, {premise:'',genre:'未知'});
        projData.imported = true;
        projData.analyzed = false;
        DB.projects[projName] = projData;
        lastName = projName;
        imported++;
        saveDB();
        await tryCreateDiskFolders(projName);
        const mdName = fname.replace(/\.(txt|md)$/i,'.md');
        try {
          // 用 FormData 上传文件（最标准的浏览器上传方式）
          const formData = new FormData();
          const blob = new Blob([rawBytes], {type:'application/octet-stream'});
          formData.append('file', blob, mdName);
          formData.append('project', projName);
          formData.append('folder', 'chapters');
          await fetch('http://127.0.0.1:8899/api/project/upload-form', {
            method:'POST', body: formData
          });
          projData.folders.chapters.push({file:mdName, source:fname});
          // 同步项目元数据到磁盘
          syncProjectMeta(projName);
        } catch(e){ /* 服务器不在时静默 */ }

        if(imported===files.length){
          DB.currentProject = lastName;
          saveDB();
          renderers.project();
        }
      };
    })(f.name.replace(/\.(md|txt)$/i,''), fileName);
    reader.readAsArrayBuffer(f);
  }
}

function createDiskFolders(name){
  // 尝试通过 Python 后端创建
  const apiUrl = `http://127.0.0.1:8899/api/project/create`;

    method: 'POST',

    if(data.created){

    _showServerModal();
  });

// ═══════ LLM 调用 ═══════
async function callLLM(messages, opt = {}){
  const prov = DB.config?.provider || 'deepseek';
  const key = _apiKeysCache[prov];
  if(!key){toast('请先在设置中保存 API Key','error');throw new Error('no key')}
  const model = opt.model || DB.config?.model || 'deepseek-v4-flash';
  let baseUrl = PROVIDER_CONFIG[prov]?.base_url || 'https://api.deepseek.com';
  if(prov==='custom') baseUrl = DB.config?.customUrl || baseUrl;
  const resp = await fetch(baseUrl.replace(/\/+$/,'')+'/chat/completions',{
    method:'POST',
    headers:{'Content-Type':'application/json','Authorization':'Bearer '+key},
    body:JSON.stringify({model,messages,temperature:opt.temperature??0.7})
  });
  const data = await resp.json();
  if(!resp.ok) throw new Error(data.error?.message||'API错误:'+resp.status);
  return data.choices[0].message.content;
}

/**
 * 流式 LLM 调用，实时通过 onChunk 回调返回内容
 * @param {Array} messages - 对话消息
 * @param {Object} opt - {max_tokens, temperature}
 * @param {Function} onChunk - 每次收到新内容时回调(当前完整文本)
 */
async function callLLMStream(messages, opt = {}, onChunk){
  const prov = DB.config?.provider || 'deepseek';
  const key = _apiKeysCache[prov];
  if(!key){toast('请先在设置中保存 API Key','error');throw new Error('no key')}
  const model = opt.model || DB.config?.model || 'deepseek-v4-flash';
  let baseUrl = PROVIDER_CONFIG[prov]?.base_url || 'https://api.deepseek.com';
  if(prov==='custom') baseUrl = DB.config?.customUrl || baseUrl;

  const resp = await fetch(baseUrl.replace(/\/+$/,'')+'/chat/completions',{
    method:'POST',
    headers:{'Content-Type':'application/json','Authorization':'Bearer '+key},
    body:JSON.stringify({model,messages,temperature:opt.temperature??0.7,stream:true})
  });
  if(!resp.ok){
    const err = await resp.json().catch(()=>({}));
    throw new Error(err.error?.message||'API错误:'+resp.status);
  }

  const reader = resp.body.getReader();
  const decoder = new TextDecoder();
  let fullContent = '';
  let buffer = '';

  while(true){
    const {done, value} = await reader.read();
    if(done) break;
    buffer += decoder.decode(value, {stream: true});
    const lines = buffer.split('\n');
    buffer = lines.pop() || '';
    for(const line of lines){
      const trimmed = line.trim();
      if(!trimmed || !trimmed.startsWith('data:')) continue;
      const data = trimmed.slice(5).trim();
      if(data === '[DONE]') continue;
      try {
        const json = JSON.parse(data);
        const delta = json.choices?.[0]?.delta?.content || '';
        if(delta){
          fullContent += delta;
          if(onChunk) onChunk(fullContent);
        }
      } catch(e){}
    }
  }
  return fullContent;
}

/**
 * 带验证/重试的 LLM 调用
 * @param {Array} messages - 对话消息数组
 * @param {Object} opt - 选项 {max_tokens, temperature}
 * @param {Object} verify - 验证规则
 * @param {Function} verify.validator - 验证响应是否合法 (response)=>boolean
 * @param {string} verify.retryPrompt - 验证失败时的重试提示
 * @param {number} verify.maxRetries - 最大重试次数（默认5）
 */
async function callLLMWithVerify(messages, opt = {}, verify = {}){
  const {validator, retryPrompt, maxRetries = 5} = verify;
  let retries = 0;
  let startTime = Date.now();

  while(retries <= maxRetries){
    // 检查是否超时（超过60秒无有效响应）
    if(retries > 0 && (Date.now() - startTime) > 60000){
      // 询问服务状态
      const healthCheck = await callLLM([
        {role:'user', content:'请回复"服务正常"以确认你处于正常工作状态。如果你收到这条消息说明之前的对话可能异常中断了。只回复"服务正常"四个字。'}
      ], {max_tokens:200, temperature:0.1});
      if(!healthCheck || !healthCheck.includes('服务正常')){
        throw new Error('LLM 服务可能异常，请检查 API Key 或网络连接');
      }
      // 重置计时器，继续正常重试（而非陷入健康检查循环）
      startTime = Date.now();
    }

    const reply = await callLLM(messages, opt);

    // 空响应检查
    if(!reply || reply.trim().length === 0){
      retries++;
      if(retries > maxRetries) throw new Error('LLM 返回空内容，请检查文本长度是否超出模型能力');
      // 添加重试提示
      messages.push({role:'user', content: retryPrompt || '请回复有效内容。如果你收到了之前的消息，请继续正常回应。'});
      continue;
    }

    // 自定义验证
    if(validator && !validator(reply)){
      retries++;
      if(retries > maxRetries) throw new Error('LLM 返回内容格式异常，请重试');
      messages.push({role:'user', content: retryPrompt || '请按照要求的格式回复。'});
      continue;
    }

    return reply; // 验证通过
  }

  throw new Error('LLM 调用失败');
}

// ═══════ 多轮对话分析（分批阅读 → 一次分析） ═══════
let _isAnalyzing = false;
function estimateTokens(text){ return Math.ceil((text||'').length * 0.6); }
async function analyzeProject(name){
  if(_isAnalyzing){toast('正在分析中，请稍候...','info');return}
  // 只允许分析已锁定的项目
  if(DB.lockedProject !== name){
    toast('请先锁定项目再分析','error');
    return;
  }
  const p = DB.projects[name];
  if(!p){toast('项目不存在','error');return}
  const hasRaw = p.rawContent && !p.chapters?.length;
  const hasChapters = p.chapters && p.chapters.length > 0 && (p.chapters||[]).some(c=>c.content?.length>50);
  const hasDiskFiles = (p.folders?.chapters||[]).length > 0;
  if(!hasRaw && !hasChapters && !hasDiskFiles){ toast('没有章节可分析','error'); return; }

  // 获取全文：优先从磁盘读取原始文件，其次 rawContent，最后 memory chapters
  let fullText = '';
  if(hasDiskFiles){
    // 从磁盘读取原始导入文件（排除自动生成的 full_text.md/part_*/chapter_*）
    const files = p.folders.chapters.filter(f=>f.file && !/^(full_text|part_\d{3}|chapter_\d{3})\.md$/.test(f.file));
    // 如果过滤后无文件，回退到全部文件
    const readFiles = files.length > 0 ? files : p.folders.chapters.filter(f=>f.file);
    for(const f of readFiles){
      const content = await readFileFromDisk(name, 'chapters', f.file);
      if(content) fullText += content + '\n\n';
    }
  }
  if(!fullText && hasRaw){
    fullText = p.rawContent;
  }
  if(!fullText && hasChapters){
    fullText = (p.chapters||[]).map(c=>c.content).join('\n\n');
  }
  if(!fullText || fullText.length < 50){ toast('章节内容为空','error'); return; }
  _isAnalyzing = true;
  window.onbeforeunload = function(){return '分析进行中，刷新将中断分析进程';};

  // 增加分析版本号
  p.analysisCount = (p.analysisCount || 0) + 1;
  const av = p.analysisCount; // 当前分析版本

  try {
    clearAnalysisLog();
    // 归一化函数（用于文本匹配）
    function _norm1(t){ return t.replace(/[\uff01-\uff5e]/g,c=>String.fromCharCode(c.charCodeAt(0)-0xfee0)).replace(/\u3000/g,' '); }
    function _norm2(t){ return t.replace(/[\s\n\r【】《》「」『』（）\[\]""''，。、；：？！·—…\.,;:!?'"\(\)\[\]]/g,''); }

    // ─── 第1步：询问 LLM 上下文能力 ───
    toast('🔍 第1步：探测模型能力...');
    logAnalysis('第1步', '探测模型上下文能力', '');
    const contextResponse = await callLLM([
      {role:'user', content:'请简要回答：你的上下文 Token 上限是多少？建议每次输入的 Token 数在什么范围最优？回答格式如："上限100K，最优30K-50K"。'}
    ], {max_tokens:200, temperature:0.1});
    logAnalysis('第1步 回复', '', contextResponse);

    // 解析最优区间，决定分批策略
    const nums = contextResponse.match(/(\d+)\s*K/g);
    let optimalMax = 50000; // 默认最优上限 50K
    if(nums){
      const vals = nums.map(n=>parseInt(n)*1000);
      const sorted = vals.sort((a,b)=>a-b);
      // 取最优区间的上限作为分批依据
      if(sorted.length >= 2) optimalMax = sorted[Math.floor(sorted.length/2)];
      else optimalMax = Math.min(sorted[0], 64000);
    }
    const totalTokens = estimateTokens(fullText);
    logAnalysis('配置', '文档约 '+Math.round(totalTokens/1000)+'K，最优上限 '+Math.round(optimalMax/1000)+'K', '');

    // 文档在容量范围内，正常处理
    let batches = [];
    const conversation = [{role:'system', content:'你是一个耐心的小说读者。我会分批发送小说内容给你阅读，你读完每批后只需回复"已读"即可。等我发出分析指令时，再基于所有已读内容做分析。'}];
    if(totalTokens <= optimalMax){
      // 在最优范围内，整篇发送（仅在内存分批，不写磁盘文件）
      batches = [fullText];
      logAnalysis('第2步', '文档在最优范围内，整篇发送（'+Math.round(totalTokens/1000)+'K）', '');
    } else {
      // 超出最优范围，按最优上限的 90% 等分（仅在内存分批，不写磁盘文件）
      const partLimit = Math.floor(optimalMax * 0.9);
      const numParts = Math.ceil(totalTokens / partLimit);
      const partSize = Math.ceil(fullText.length / numParts);
      let partStart = 0;
      for(let i=0; i<numParts; i++){
        let partEnd = (i+1 < numParts) ? Math.floor((i+1) * partSize) : fullText.length;
        // 在段落边界分割，避免切断句子
        if(i+1 < numParts && partEnd < fullText.length){
          const searchS = Math.max(partEnd - 2000, partStart);
          const searchE = Math.min(partEnd + 2000, fullText.length);
          const seg = fullText.substring(searchS, searchE);
          let boundary = seg.lastIndexOf('\n\n', partEnd - searchS);
          if(boundary < 0 || boundary < 50) boundary = seg.lastIndexOf('\n', partEnd - searchS);
          if(boundary > 0 && boundary < seg.length - 50) partEnd = searchS + boundary;
        }
        const part = fullText.substring(partStart, partEnd).trim();
        batches.push(part);
        partStart = partEnd;
      }
      logAnalysis('第2步', '超出最优范围，等分为 '+batches.length+' 批（每批约 '+Math.round(partLimit/1000)+'K）', '');
    }
    for(let i=0; i<batches.length; i++){
      toast(`📖 第${i+1}/${batches.length}批：阅读中...`);
      const preview = batches[i].substring(0,80).replace(/\n/g,' ');
      conversation.push({role:'user', content:'请阅读以下第'+(i+1)+'/'+batches.length+'部分内容，读完后回复"已读"：\n\n'+batches[i]});
      const reply = await callLLMWithVerify(conversation, {max_tokens:1024, temperature:0.1}, {
        validator: r => /已读/.test(r),
        retryPrompt: '请回复"已读"以确认你已经阅读了以上内容。只回复"已读"两个字。',
        maxRetries: 8
      });
      // 检查 LLM 是否返回空（超长文本/API错误）
      if(!reply || reply.trim().length === 0){
        throw new Error('第2步阅读失败：LLM 返回空内容，文本可能超出模型容量限制');
      }
      // 将 assistant 回复添加到对话中（供后面步骤使用）
      conversation.push({role:'assistant', content: reply.substring(0, 200)});
    }

    // 将每批分割结果保存为独立章节文件（供查看分割是否正确）
    p.chapters = [];
    p.folders.chapters = p.folders.chapters.filter(f => !f.file || !/^chapter_\d{3}\.md$/.test(f.file));
    for(let i=0; i<batches.length; i++){
      const chNum = i + 1;
      p.chapters.push({number:chNum, title:'', content:batches[i], status:'draft', created_at:new Date().toISOString()});

    // ★ 连续性指标（初始计算，供节奏控制台展示）

    if(data.skills){p.skills=data.skills;p.folders.skills=p.folders.skills||{external:[],self:[]};const sk=[];(data.skills.strengths||[]).forEach(s=>{sk.push('## 优点: '+s.aspect+'\n\n示例: '+(s.examples||'')+'\n\n'+(s.detail||''));});(data.skills.weaknesses||[]).forEach(w=>{sk.push('## 不足: '+w.aspect+'\n\n示例: '+(w.examples||'')+'\n\n'+(w.detail||'')+'\n\n改进建议: '+(w.improvement||''));});if(data.skills.overall_advice) sk.push('## 综合建议\n\n'+data.skills.overall_advice);p.folders.skills.self=sk;}else{
      logAnalysis('第5步', 'skills 字段缺失', 'LLM 未输出写作技能评价');

    saveDB();

        timestamp: new Date().toISOString(), time: new Date().toLocaleString()

    window.onbeforeunload = null;

  } catch(e){

          timestamp: new Date().toISOString(), error: e.message?.substring(0,200)

// ═══════ 人类行为规律总结（写作时注入 Writer） ═══════
const WRITER_BEHAVIORAL_PRINCIPLES = `人类行为的关键规律——写作时让角色的行为真实可信：

【决策规律】
• 失去的痛苦≈得到的快乐的两倍。角色面对"确定损失"时会冒极大胆的风险去避免它
• 角色对已经投入的（时间/感情/金钱）难以割舍——即使继续投入已无意义
• 人做决定时不是在算绝对值，而是在和"参照点"比。同一个结果，对有的人是赚、对有的人是亏
• 面对收益时保守（见好就收），面对损失时冒险（赌一把翻盘）
• 人对"现在"的估值远高于"未来"。立flag容易，执行flag难
• 角色最在意的不是"得到什么"，而是"和身边的人比是多了还是少了"

【互动规律】
• 一次性相遇容易背叛（因为没有后果），长期关系容易合作（因为还要见面）
• 信任一旦被打破，需要10次合作才能修复1次背叛
• 合作的高风险需要信任机制：共同敌人、第三方担保、或长期的交情
• 双方都在赌对方先让步时，最危险——需要有非理性承诺的一方才会破局
• 人宁可得不到好处也要惩罚不公平的对待。这不是冲动，是人性深处的公平需求
• 人在社交场合和交易场合的行为逻辑完全不同——混用会出问题

【行为真实感规律】
• 任何出人意料的角色行为都需要：充分的动机 + 渐进的铺垫 + 匹配的代价
• 越反常的行为，需要的代价越大。一个好人撒个小谎不需要代价，一个忠臣叛国需要毁灭性的代价
• 反常行为的频率越低，单次反常的可信度越高
• 反常的是行为而不是价值观——底层价值观一致时，行为再反常也能被理解
• 角色做了反常的事之后，要有"事后反应"——愧疚、合理化、恐惧或解脱。没有后果的反常就是硬伤
• 角色的成长弧需要：旧信念→事件冲击→反思→新认知→新行为。跳过任何一步都会显得生硬`;

// ═══════ 写作上下文组装 ═══════
function getWriterContext(projectName){
  const p = DB.projects[projectName];
  if(!p) return '';

  let context = '';

  // 1. 世界树数据
  const wt = p.worldTree;
  if(wt && wt.trunk && wt.trunk.length){
    context += `【当前故事进展】\n主线已推进到以下节点：\n`;
    context += (wt.trunk||[]).map(t=>`· ${wt.trunk.indexOf(t)+1}. 第${t.chapter}章：${t.event}（重要性${t.importance}）`).join('\n') + '\n';
    if(wt.buds && wt.buds.length){
      const urgent = wt.buds.filter(b=>b.urgency==='高');
      if(urgent.length){
        context += `\n读者最想揭晓的伏笔：\n${urgent.map(b=>`· 第${b.chapter}章埋下：${b.foreshadow}`).join('\n')}\n`;
      }
    }
    context += '\n';
  }

  // 2. 角色行为模型
  const chars = p.readerData?.characters || p.characters || {};
  const charValues = Object.values(chars).filter(c=>c.name);
  if(charValues.length){
    context += `【角色行为模型——写作时必须严格遵守】\n`;
    charValues.forEach(ch=>{
      context += `\n【${ch.name}】${ch.reader_tag||ch.tag||''}\n`;
      // ★ 始终发送 behavioral_model（如有）
      if(ch.behavioral_model){
        context += `行为模式：${ch.behavioral_model}\n`;
      }
      // ★ 始终发送各维度细节（即使已有 behavioral_model，也不省略）
      const parts = [];
      if(ch.decision_style) parts.push(`做决定${ch.decision_style}`);
      if(ch.risk_attitude) parts.push(`面对得失${ch.risk_attitude}`);
      if(ch.trust_pattern) parts.push(`信任倾向：${ch.trust_pattern}`);
      if(ch.conflict_style) parts.push(`冲突处理：${ch.conflict_style}`);
      if(ch.bottom_line) parts.push(`底线：${ch.bottom_line}`);
      if(ch.breaking_point) parts.push(`突破底线的条件：${ch.breaking_point}`);
      if(parts.length) context += `行为细节：${parts.join('；')}\n`;
      // ★ traits 漏发
      if(ch.traits && ch.traits.length) context += `性格标签：${ch.traits.join('、')}\n`;
      if(ch.cares_about && ch.cares_about.length) context += `在意的：${ch.cares_about.join('、')}\n`;
      if(ch.fears && ch.fears.length) context += `恐惧的：${ch.fears.join('、')}\n`;
      // ★ relationships 漏发
      if(ch.relationships && Object.keys(ch.relationships).length){
        context += `关系网：${Object.entries(ch.relationships).map(([k,v])=>`${k}(${v})`).join('、')}\n`;
      }
      if(ch.consistency_issues && ch.consistency_issues.length) context += `⚠️ 需注意的一致性：${ch.consistency_issues.join('；')}\n`;
    });
    context += '\n';
  }

  // 3. 节奏上下文
  const rhythm = p.rhythm || p.readerData?.rhythm;
  if(rhythm){
    context += `【当前阅读节奏】\n`;
    context += `整体节奏：${rhythm.overall_pacing||'未知'}\n`;
    if(rhythm.top_questions && rhythm.top_questions.length){
      context += `读者最想知道：${rhythm.top_questions.slice(0,3).map((q,i)=>`${i+1}、${q}`).join(' ')}\n`;
    }
    if(rhythm.next_chapter_hope) context += `读者对下一章的期待：${rhythm.next_chapter_hope}\n`;
    context += '\n';
  }

  // 4. 写作备忘录
  const memo = p.writerMemo || p.readerData?.memo;
  if(memo){
    if(memo.writer_advice && memo.writer_advice.length){
      context += `【写作建议】\n${memo.writer_advice.map(a=>`· ${a}`).join('\n')}\n\n`;
    }
    if(memo.warnings && memo.warnings.length){
      context += `【⚠️ 警告】\n${memo.warnings.map(w=>`· ⚠️ ${w}`).join('\n')}\n\n`;
    }
  }

  // 5. 写作技能评价
  const skills = p.skills || p.readerData?.skills;
  if(skills){
    if(skills.strengths && skills.strengths.length){
      context += `【本文优点——继续保持】\n`;
      skills.strengths.forEach(s=>{
        context += `· ${s.aspect}：${s.detail||''}\n`;
      });
      context += '\n';
    }
    if(skills.weaknesses && skills.weaknesses.length){
      context += `【本文不足——写作时注意改进】\n`;
      skills.weaknesses.forEach(w=>{
        context += `· ${w.aspect}：${w.detail||''}\n`;
        if(w.improvement) context += `  改进：${w.improvement}\n`;
      });
      context += '\n';
    }
    if(skills.overall_advice){
      context += `【综合建议】\n${skills.overall_advice}\n\n`;
    }
  }

  // 6. ★ 故事状态（角色位置/情节线/伏笔/时间线）
  const ss = p.storyState;
  if(ss?.characters){
    const activeChars = Object.values(ss.characters).filter(c=>c.lastAppearance > 0);
    if(activeChars.length){
      context += `【角色当前状态】\n`;
      activeChars.forEach(c=>{
        const st = c.status==='dead'?'💀':c.status==='missing'?'❓':'';
        context += `· ${st} ${c.name} 位于「${c.currentLocation}」，情绪「${c.emotionalState}」，最近出场第${c.lastAppearance}章\n`;
      });
      context += '\n';
    }
    const deadChars = Object.values(ss.characters).filter(c=>c.status==='dead');
    if(deadChars.length){
      context += `【已死亡角色（⚠️ 非硬性规定——作者若已设伏笔/悬疑/或明确要求复活则可）】\n`;
      deadChars.forEach(c=>{
        context += `· 💀 ${c.name}（死于第${c.lastAppearance}章附近）\n`;
      });
      context += `注意：这只是当前标记，不限制你发挥。如果故事需要、作者有伏笔铺垫或明确指示，完全可以让角色复活或出现于闪回/幻觉/平行叙事中。\n\n`;
    }
  }
  if(ss?.plotThreads){
    const active = Object.values(ss.plotThreads).filter(t=>t.status==='active');
    if(active.length){
      context += `【进行中的情节线】\n`;
      active.forEach(t=>{
        context += `· ${t.name}（引入第${t.introducedChapter}章）\n`;
      });
      context += '\n';
    }
  }
  if(ss?.foreshadowingBank){
    const pending = ss.foreshadowingBank.filter(b=>!b.resolved);
    if(pending.length){
      context += `【待回收伏笔】\n`;
      pending.forEach(b=>{
        context += `· 第${b.plantedChapter}章埋下：${b.foreshadow}（${b.urgency}优先级）\n`;
      });
      context += '\n';
    }
  }
  if(ss?.timeline?.length){
    context += `【时间线概览】\n`;
    const recent = ss.timeline.slice(-5);
    recent.forEach(t=>{
      context += `· 第${t.chapter}章（第${t.day}天）：${t.summary.substring(0,40)}\n`;
    });
    context += '\n';
  }

  return context;
}

function showChapterModal(chapterNum){

let _analysisLogEntries = [];
let _currentSessionId = null;
function logAnalysis(round, question, answer){
  const entry = {
    round, question, answer: answer||'(等待回复...)',
    time: new Date().toLocaleTimeString(),
    sessionId: _currentSessionId
  };
  _analysisLogEntries.push(entry);
  // 同时存入项目日志
  const locked = getLockedProject();
  if(locked){
    const p = DB.projects[locked.name];
    if(p && p.folders?.projectLog){
      p.folders.projectLog.push({
        type:'analysis_log', round, question, answer: answer||'',
        timestamp:new Date().toISOString(), sessionId: _currentSessionId
      });
    }
  }
}
function clearAnalysisLog(){
  _currentSessionId = Date.now();
  _analysisLogEntries = [];
  // 在 projectLog 中写入会话开始标记
  const locked = getLockedProject();
  if(locked){
    const p = DB.projects[locked.name];
    if(p && p.folders?.projectLog){
      p.folders.projectLog.push({
        type:'analysis_session_start', sessionId: _currentSessionId,
        timestamp: new Date().toISOString(),
        time: new Date().toLocaleString()
      });
    }
  }
}

// ═══════ 世界树页面 ═══════
renderers.worldtree = function(){
  const main = document.getElementById('page-worldtree');
  const side = document.getElementById('page-worldtree-side');
  const locked = getLockedProject();
  if(!locked){main.innerHTML=lockedMsg();side.innerHTML='';return}
  if(_isAnalyzing){main.innerHTML=analyzingMsg();side.innerHTML='';return}
  const p = DB.projects[locked.name];
  const rd = p?.readerData?.plot_structure;
  const wt = p?.worldTree;
  const hasData = (rd && (rd.trunk?.length||rd.branches?.length||rd.buds?.length||rd.roots?.length)) || 
                  (wt && (wt.trunk?.length||wt.branches?.length||wt.buds?.length||wt.roots?.length));
  if(!hasData){
    main.innerHTML = `<div class="page-title">🌳 世界树</div><div class="empty-state"><p>暂无剧情数据</p><p style="font-size:12px;color:var(--text-dim);margin-top:8px">请在项目管理中对项目执行「分析」后查看</p></div>`;
    side.innerHTML = `<div class="card"><div class="card-title">📖 项目</div><div style="font-size:13px;color:var(--text-dim)">${locked.name}</div></div>`;
    return;
  }

  // 计算健康度
  const totalBuds = (wt?.buds||rd?.buds||[]).length;
  const activeBranches = (wt?.branches||rd?.branches||[]).length;
  const totalTrunk = (wt?.trunk||rd?.trunk||[]).length;
  const health = Math.min(1, (totalTrunk*0.3 + (activeBranches>0?0.3:0) + (totalBuds<10?0.4:0.2)));

  let html = `<div class="page-title">🌳 世界树</div>`;

  // 四指标卡片
  html += `<div class="grid-4" style="margin-bottom:12px">
    <div class="card" style="text-align:center"><div style="font-size:24px">🌱</div><div style="font-size:20px;font-weight:700">${totalBuds}</div><div style="font-size:11px;color:var(--text-dim)">伏笔</div></div>
    <div class="card" style="text-align:center"><div style="font-size:24px">🌿</div><div style="font-size:20px;font-weight:700">${activeBranches}</div><div style="font-size:11px;color:var(--text-dim)">支线</div></div>
    <div class="card" style="text-align:center"><div style="font-size:24px">📖</div><div style="font-size:20px;font-weight:700">${totalTrunk}</div><div style="font-size:11px;color:var(--text-dim)">主干节拍</div></div>
    <div class="card" style="text-align:center"><div style="font-size:24px">🌳</div><div style="font-size:20px;font-weight:700">${Math.round(health*100)}%</div><div style="font-size:11px;color:var(--text-dim)">健康度</div></div>
  </div>`;

  // 主干剧情线
  const trunk = rd?.trunk||wt?.trunk||[];
  html += `<div class="card"><div class="card-title">📖 主线剧情</div>`;
  if(trunk.length){
    html += `<div style="padding:8px 0">`;
    trunk.forEach((t,i)=>{
      const imp = t.importance||5;
      const chNum = t.chapter||(i+1);
      html += `<div style="display:flex;gap:8px;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.04)">
        <span style="background:var(--cyan);color:var(--bg);border-radius:50%;width:24px;height:24px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;cursor:pointer" onclick="showChapterModal(${chNum})" title="点击查看第${chNum}章">${chNum}</span>
        <div style="flex:1"><div>${t.event||t.title||''}</div>
          <div style="font-size:11px;color:var(--text-dim)">重要性: ${'⭐'.repeat(Math.min(Math.round(imp/2),5))} (${imp}/10) · <span style="cursor:pointer;color:var(--cyan);text-decoration:underline" onclick="showChapterModal(${chNum})">📖 查看原文</span></div></div>
      </div>`;
    });
    html += `</div>`;
  } else { html += `<p style="color:var(--text-dim)">暂无主干数据</p>`; }
  html += `</div>`;

  // 支线 + 伏笔双栏
  html += `<div class="row" style="gap:12px"><div class="col">`;
  html += `<div class="card"><div class="card-title">🌿 支线</div>`;
  const branches = rd?.branches||wt?.branches||[];
  if(branches.length){
    branches.forEach(b=>{
      const icon = {seed:'🌱',sprout:'🌿',growing:'🌳',blooming:'🌸',fruiting:'🍎'}[b.status]||'🌿';
      html += `<div style="padding:6px 0;border-bottom:1px solid rgba(255,255,255,.04)">
        <div>${icon} <strong>${b.name||''}</strong></div>
        <div style="font-size:11px;color:var(--text-dim)">始于第${b.start_chapter||'?'}章 · ${b.status||'发展中'} · 关联度: ${(b.relation||5)+'/10'}</div>
      </div>`;
    });
  } else { html += `<p style="color:var(--text-dim)">暂无支线数据</p>`; }
  html += `</div></div><div class="col">`;

  // 伏笔
  html += `<div class="card"><div class="card-title">🌱 伏笔</div>`;
  const buds = rd?.buds||wt?.buds||[];
  if(buds.length){
    buds.forEach(b=>{
      const urg = b.urgency||'中';
      const color = urg==='高'?'var(--accent)':urg==='中'?'var(--orange)':'var(--text-dim)';
      const chNum = b.chapter||b.planted||'?';
      html += `<div style="padding:6px 0;border-bottom:1px solid rgba(255,255,255,.04)">
        <div style="color:${color}">${urg==='高'?'🔴':urg==='中'?'🟡':'⚪'} ${b.foreshadow||b.title||''}</div>
        <div style="font-size:11px;color:var(--text-dim)">第${chNum}章埋设${chNum!=='?'?` · <span style="cursor:pointer;color:var(--cyan);text-decoration:underline" onclick="showChapterModal(${chNum})">📖 查看原文</span>`:''}</div>
      </div>`;
    });
  } else { html += `<p style="color:var(--text-dim)">暂无伏笔数据</p>`; }
  html += `</div></div></div>`;

  // 世界观根
  const roots = rd?.roots||wt?.roots||[];
  if(roots.length){
    html += `<div class="card"><div class="card-title">🌳 世界观设定</div>
      <div style="display:flex;flex-wrap:wrap;gap:6px">`;
    roots.forEach(r=>{
      html += `<span style="background:rgba(46,213,115,.1);color:var(--green);padding:4px 10px;border-radius:12px;font-size:12px">${r.category||'设定'}: ${(r.content||'').substring(0,40)}</span>`;
    });
    html += `</div></div>`;
  }

  main.innerHTML = html;
  side.innerHTML = `<div class="card"><div class="card-title">📖 ${locked.name}</div>
    <div style="font-size:12px;color:var(--text-dim);line-height:1.8">
      <div>🌱 伏笔: ${totalBuds}个</div>
      <div>🌿 支线: ${activeBranches}条</div>
      <div>📖 主干: ${totalTrunk}个节拍</div>
      <div>🌳 健康度: ${Math.round(health*100)}%</div>
    </div>
  </div>`;
};

// ═══════ 节奏控制台页面 ═══════
renderers.tension = function(){
  const main = document.getElementById('page-tension');
  const side = document.getElementById('page-tension-side');
  const locked = getLockedProject();
  if(!locked){main.innerHTML=lockedMsg();side.innerHTML='';return}
  if(_isAnalyzing){main.innerHTML=analyzingMsg();side.innerHTML='';return}
  const p = DB.projects[locked.name];
  const rhythm = p?.readerData?.rhythm;
  const tensions = p?.tensions||[];
  const hasData = rhythm && rhythm.per_chapter?.length;
  const name = T('tension');
  // 连续性指标（可能在分析时已计算，也可能尚未）
  const cm = p?.continuity || (hasData ? computeContinuityMetrics(p) : null);

  if(!hasData){
    main.innerHTML = `<div class="page-title">${name}</div><div class="empty-state"><p>暂无节奏数据</p><p style="font-size:12px;color:var(--text-dim);margin-top:8px">请在项目管理中对项目执行「分析」后查看</p></div>`;
    side.innerHTML = `<div class="card"><div class="card-title">📖 项目</div><div style="font-size:13px;color:var(--text-dim)">${locked.name}</div></div>`;
    return;
  }

  const chapters = rhythm.per_chapter;
  const lastCh = chapters[chapters.length-1];
  const avg = chapters.reduce((s,c)=>(s+c.page_turner||0)+(c.emotion||0),0)/(chapters.length*2);
  const recent3 = chapters.slice(-3);
  const trend = recent3.length>=3?(recent3[2].page_turner > recent3[0].page_turner?'上升中':recent3[2].page_turner<recent3[0].page_turner?'回落中':'稳定'):'待定';

  let html = `<div class="page-title">📊 阅读节奏</div>`;

  // 当前状态卡片
  html += `<div class="grid-3" style="margin-bottom:12px">
    <div class="card" style="text-align:center">
      <div style="font-size:11px;color:var(--text-dim)">最新章节吸引力</div>
      <div style="font-size:28px;font-weight:700;color:var(--cyan)">${lastCh.page_turner||'?'}</div>
      <div style="font-size:11px;color:var(--text-dim)">/ 10</div>
    </div>
    <div class="card" style="text-align:center">
      <div style="font-size:11px;color:var(--text-dim)">整体节奏</div>
      <div style="font-size:20px;font-weight:700;color:var(--orange)">${rhythm.overall_pacing||'未知'}</div>
      <div style="font-size:11px;color:var(--text-dim)">${trend}</div>
    </div>
    <div class="card" style="text-align:center">
      <div style="font-size:11px;color:var(--text-dim)">平均阅读吸引力</div>
      <div style="font-size:28px;font-weight:700;color:var(--green)">${avg.toFixed(1)}</div>
      <div style="font-size:11px;color:var(--text-dim)">/ 10</div>
    </div>
  </div>`;

  // 逐章数据卡片
  html += `<div class="card"><div class="card-title">📖 逐章阅读体验</div>`;
  chapters.forEach(c=>{
    const total = ((c.page_turner||5)+(c.emotion||5))/2;
    html += `<div style="display:flex;gap:8px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.04);align-items:center">
      <span style="background:linear-gradient(135deg,var(--cyan),var(--purple));color:#fff;border-radius:50%;width:28px;height:28px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0">${c.chapter}</span>
      <div style="flex:1">
        <div style="display:flex;gap:12px;font-size:12px">
          <span>吸引力: <strong style="color:var(--cyan)">${c.page_turner||'?'}</strong></span>
          <span>情感: <strong style="color:var(--accent)">${c.emotion||'?'}</strong></span>
          <span>综合: <strong>${total.toFixed(1)}</strong></span>
          <span style="color:var(--text-dim)">${c.role||''}</span>
        </div>
      </div>
      <div style="width:80px;height:6px;background:rgba(255,255,255,.1);border-radius:3px;overflow:hidden">
        <div style="height:100%;width:${total*10}%;background:linear-gradient(90deg,var(--cyan),var(--purple));border-radius:3px"></div>
      </div>
    </div>`;
  });
  html += `</div>`;

  // 读者最想知道 + 下一章期待
  html += `<div class="row" style="gap:12px;margin-top:12px"><div class="col">`;
  html += `<div class="card"><div class="card-title">❓ 读者最想知道</div>`;
  if(rhythm.top_questions?.length){
    rhythm.top_questions.forEach((q,i)=>{
      html += `<div style="padding:6px 0;border-bottom:1px solid rgba(255,255,255,.04)">${i+1}. ${q}</div>`;
    });
  } else { html += `<p style="color:var(--text-dim)">暂无数据</p>`; }
  html += `</div></div><div class="col">`;
  html += `<div class="card"><div class="card-title">🔮 读者对下一章的期待</div>
    <p style="color:var(--text-dim)">${rhythm.next_chapter_hope||'暂无数据'}</p>
  </div>`;
  html += `</div></div>`;

  // 张弛指导
  html += `<div class="card" style="margin-top:12px"><div class="card-title">🎯 节奏写作指导</div>
    <div style="font-size:12px;color:var(--text-dim);line-height:1.8">
      <div>🌊 <strong>平静期</strong> (1-3): 角色发展、日常、铺垫<br>
      📈 <strong>蓄力期</strong> (3-5): 冲突酝酿、伏笔埋设<br>
      🔥 <strong>上升期</strong> (5-7): 障碍增加、紧迫感上升<br>
      💥 <strong>高潮</strong> (8-10): 正面冲突、真相揭露<br>
      🌿 <strong>回落期</strong> (5→3): 后果处理、新方向萌芽</div>
      <div style="margin-top:8px;padding:8px;background:rgba(255,159,67,.1);border-radius:6px;color:var(--orange)">
        ⚡ 关键规则: 连续上升不超过5章 | 高潮后至少2章恢复期 | 张力永不降至1.0以下
      </div>
    </div>
  </div>

  <!-- ═══ 故事连续性仪表盘 ═══ -->
  <div class="card" style="margin-top:12px">
    <div class="card-title">📊 故事健康度 <span style="font-size:11px;color:var(--text-dim);font-weight:400">(连续性监控)</span></div>
    <div style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:8px">
      <div style="text-align:center;padding:6px 14px;background:rgba(0,212,255,.08);border-radius:8px;flex:1">
        <div style="font-size:9px;color:var(--text-dim)">健康分</div>
        <div style="font-size:22px;font-weight:700;color:${(cm?.healthScore||100)>=80?'var(--green)':(cm?.healthScore||100)>=50?'var(--orange)':'var(--accent)'}">${cm?.healthScore||100}</div>
        <div style="font-size:9px;color:var(--text-dim)">/ 100</div>
      </div>
      <div style="text-align:center;padding:6px 14px;background:rgba(46,213,115,.08);border-radius:8px;flex:1">
        <div style="font-size:9px;color:var(--text-dim)">角色活跃</div>
        <div style="font-size:20px;font-weight:700;color:var(--green)">${cm?.characterHealth.active||0}</div>
        <div style="font-size:9px;color:var(--text-dim)">/ ${cm?.characterHealth.total||0}</div>
      </div>
      <div style="text-align:center;padding:6px 14px;background:rgba(255,159,67,.08);border-radius:8px;flex:1">
        <div style="font-size:9px;color:var(--text-dim)">情节线停滞</div>
        <div style="font-size:20px;font-weight:700;color:${(cm?.threadHealth?.stalled||0)>0?'var(--orange)':'var(--text-dim)'}">${cm?.threadHealth?.stalled||0}</div>
        <div style="font-size:9px;color:var(--text-dim)">/ ${cm?.threadHealth?.total||0}</div>
      </div>
      <div style="text-align:center;padding:6px 14px;background:rgba(233,96,96,.08);border-radius:8px;flex:1">
        <div style="font-size:9px;color:var(--text-dim)">伏笔超期</div>
        <div style="font-size:20px;font-weight:700;color:${(cm?.foreshadowingHealth?.overdue||0)>0?'var(--accent)':'var(--text-dim)'}">${cm?.foreshadowingHealth?.overdue||0}</div>
        <div style="font-size:9px;color:var(--text-dim)">/ ${cm?.foreshadowingHealth?.total||0}</div>
      </div>
    </div>`;

  // 详细问题列表
  const allIssues = [];

    allIssues.push({type:'角色', name:i.name, status:i.status, detail:i.detail, severity:i.status==='never_appeared'?'CRITICAL':'WARNING'});
  });
  (cm?.threadHealth?.items||[]).filter(i=>i.status==='stalled').forEach(i=>{
    allIssues.push({type:'情节线', name:i.name, status:i.status, detail:i.detail, severity:'WARNING'});
  });
  (cm?.foreshadowingHealth?.items||[]).filter(i=>i.status==='overdue').forEach(i=>{
    allIssues.push({type:'伏笔', name:i.foreshadow, status:i.status, detail:i.detail, severity:'WARNING'});
  });

  if(allIssues.length){
    html += `<details open><summary style="cursor:pointer;font-size:11px;color:var(--text-dim)">⚠️ ${allIssues.length}个待处理问题</summary><div style="margin-top:4px">`;
    allIssues.forEach(issue=>{
      const sevIcon=issue.severity==='CRITICAL'?'🔴':'⚠️';
      const sevColor=issue.severity==='CRITICAL'?'var(--accent)':'var(--orange)';
      html += `<div style="padding:3px 0;font-size:10px;border-bottom:1px solid rgba(255,255,255,.03)">
        <span style="color:${sevColor}">${sevIcon} [${issue.type}] ${issue.name||''}</span>
        <span style="color:var(--text-dim)"> — ${issue.detail||''}</span>
      </div>`;
    });
    html += `</div></details>`;
  } else {
    html += `<div style="font-size:11px;color:var(--green);padding:4px 0">✅ 故事状态健康，无待处理问题</div>`;
  }

  <!-- ═══ 故事状态摘要（story_state.json） ═══ -->
  const ss = p?.storyState;
  if(ss?.characters){
    html += `<div style="margin-top:8px;padding-top:8px;border-top:1px solid rgba(255,255,255,.06)">`;
    html += `<div style="display:flex;gap:8px;align-items:center;margin-bottom:6px">
      <span class="card-title" style="margin:0;font-size:12px">📋 故事状态快照</span>
      <span style="font-size:9px;color:var(--text-dim)">上次更新: ${new Date(ss.updatedAt).toLocaleString('zh-CN')}</span>

    html += `<details open><summary style="cursor:pointer;font-size:10px;color:var(--text-dim);margin-bottom:4px">👥 角色 (${chars.length})</summary>`;
    html += `<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:4px">`;

    html += `</div></details>`;
    const threads = Object.values(ss.plotThreads||{});
    if(threads.length){
      html += `<details style="margin-top:4px"><summary style="cursor:pointer;font-size:10px;color:var(--text-dim);margin-bottom:2px">🌿 情节线 (${threads.length})</summary>`;
      threads.forEach(t=>{
        const icon = t.status==='resolved'?'✅':t.status==='dormant'?'💤':'🔄';
        html += `<div style="font-size:10px;padding:1px 0">${icon} ${t.name} — ${t.status}</div>`;
      });
      html += `</details>`;
    }
    const buds = ss.foreshadowingBank?.filter(b=>!b.resolved)||[];
    if(buds.length){
      html += `<details style="margin-top:4px"><summary style="cursor:pointer;font-size:10px;color:var(--text-dim);margin-bottom:2px">🌱 待回收伏笔 (${buds.length})</summary>`;
      buds.forEach(b=>{
        const age = (p?.chapters?.length||1) - b.plantedChapter;
        const urg = b.urgency==='高'?'🔴':b.urgency==='低'?'🟢':'🟡';
        html += `<div style="font-size:10px;padding:1px 0">${urg} 第${b.plantedChapter}章: ${b.foreshadow} (${age}章前)</div>`;
      });
      html += `</details>`;
    }
    const tl = ss.timeline||[];
    if(tl.length){
      html += `<details style="margin-top:4px"><summary style="cursor:pointer;font-size:10px;color:var(--text-dim);margin-bottom:2px">📅 时间线 (${tl.length}章)</summary>`;
      tl.slice(-3).forEach(t=>{
        html += `<div style="font-size:10px;padding:1px 0"><strong>第${t.chapter}章</strong> — ${t.summary.substring(0,50)}</div>`;
      });
      if(tl.length>3) html += `<div style="font-size:10px;color:var(--text-dim)">...共${tl.length}章</div>`;
      html += `</details>`;
    }
    html += `</div>`;
  }

  html += `</div>`;

  main.innerHTML = html;
  side.innerHTML = `<div class="card"><div class="card-title">📖 ${locked.name}</div>
    <div style="font-size:12px;color:var(--text-dim);line-height:1.8">
      <div>📊 共 ${chapters.length} 章</div>
      <div>🎯 节奏: ${rhythm.overall_pacing||'未知'}</div>
      <div>📈 趋势: ${trend}</div>
      <div>💡 读者想知道: ${(rhythm.top_questions||[]).length}件事</div>
      <hr class="sep" style="margin:6px 0">
      <div>📊 健康分: <strong style="color:${(cm?.healthScore||100)>=80?'var(--green)':(cm?.healthScore||100)>=50?'var(--orange)':'var(--accent)'}">${cm?.healthScore||100}</strong></div>
      <div style="font-size:11px">👤 角色: ${cm?.characterHealth?.active||0}活跃 / ${(cm?.characterHealth?.absent||0)+(cm?.characterHealth?.neverAppeared||0)}问题</div>

const RADAR_LABELS = ['果断','冒险','信任','强硬','原则','忍耐'];
// 从角色文本描述中估算六维度数值（1-10）
function estimateRadarValues(ch){
  const v = [5,5,5,5,5,5]; // 默认中等
  const txt = [ch.decision_style||'', ch.risk_attitude||'', ch.trust_pattern||'', ch.conflict_style||'', ch.bottom_line||'', ch.breaking_point||'', ch.behavioral_model||''].join(' ');
  const low = ['谨慎','犹豫','保守','回避','温和','多疑','不信任','软弱','让步','灵活','容忍','忍让','退让','胆小'];
  const high = ['果断','激进','冒险','直接','强硬','坚定','信任','勇敢','强势','坚持','不留余地','冲动','极端','刚烈','激烈'];
  const keyTxt = [ch.decision_style, ch.risk_attitude, ch.trust_pattern, ch.conflict_style, ch.bottom_line, ch.breaking_point].join(' ');
  // 为每个维度打分
  const pairs = [
    [0, ['果断','激进','雷厉','直接','快速','坚定'], ['犹豫','纠结','拖延','慎重','谨慎','保守']],
    [1, ['冒进','冒险','激进','赌','拼','大胆','放手一搏'], ['保守','求稳','稳妥','保险','安全','回避风险']],
    [2, ['信任','开放','坦诚','轻信','依赖'], ['多疑','警惕','不信任','怀疑','戒备','封闭']],
    [3, ['强硬','直接','对抗','正面','强势','激烈','刚'], ['温和','回避','妥协','让步','圆滑','绕弯']],
    [4, ['坚定','绝不','不可逾越','死','硬','底线分明'], ['灵活','能妥协','弹性','可商量','变通']],
    [5, ['极易突破','一碰就','脆弱','敏感','容易崩溃'], ['极强','难以突破','坚韧','顽强','耐压','能忍']],
  ];
  pairs.forEach(([idx, hiWords, loWords])=>{
    let score = 5;
    hiWords.forEach(w=>{ if(keyTxt.includes(w)) score += 2; });
    loWords.forEach(w=>{ if(keyTxt.includes(w)) score -= 2; });
    v[idx] = Math.max(1, Math.min(10, score));
  });
  return v;
}
function drawRadarChart(canvasId, values){
  const canvas = document.getElementById(canvasId);
  if(!canvas) return;
  const ctx = canvas.getContext('2d');
  const w = canvas.width, h = canvas.height;
  const cx = w/2, cy = h/2, r = Math.min(cx, cy) - 18;
  ctx.clearRect(0,0,w,h);

  const n = 6;
  // 背景网格
  for(let ring=1; ring<=5; ring++){
    const rr = r * ring / 5;
    ctx.beginPath();
    for(let i=0; i<=n; i++){
      const angle = Math.PI/2 - i * 2*Math.PI/n;
      const x = cx + rr * Math.cos(angle);
      const y = cy - rr * Math.sin(angle);
      i===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
    }
    ctx.closePath();
    ctx.strokeStyle = 'rgba(255,255,255,.08)';
    ctx.lineWidth = 1;
    ctx.stroke();
  }
  // 轴线
  for(let i=0; i<n; i++){
    const angle = Math.PI/2 - i * 2*Math.PI/n;
    const x = cx + r * Math.cos(angle);
    const y = cy - r * Math.sin(angle);
    ctx.beginPath(); ctx.moveTo(cx,cy); ctx.lineTo(x,y);
    ctx.strokeStyle = 'rgba(255,255,255,.06)';
    ctx.stroke();
  }
  // 数据填充
  ctx.beginPath();
  for(let i=0; i<=n; i++){
    const idx = i % n;
    const angle = Math.PI/2 - idx * 2*Math.PI/n;
    const val = Math.max(0.1, Math.min(1, (values[idx]||5)/10));
    const x = cx + r * val * Math.cos(angle);
    const y = cy - r * val * Math.sin(angle);
    i===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
  }
  ctx.closePath();
  ctx.fillStyle = 'rgba(0,212,255,.15)';
  ctx.fill();
  ctx.strokeStyle = 'var(--cyan)';
  ctx.lineWidth = 1.5;
  ctx.stroke();
  // 数据点
  for(let i=0; i<n; i++){
    const angle = Math.PI/2 - i * 2*Math.PI/n;
    const val = Math.max(0.1, Math.min(1, (values[i]||5)/10));
    const x = cx + r * val * Math.cos(angle);
    const y = cy - r * val * Math.sin(angle);
    ctx.beginPath(); ctx.arc(x,y,3,0,2*Math.PI);
    ctx.fillStyle = 'var(--cyan)';
    ctx.fill();
  }
  // 标签
  ctx.font = '11px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  RADAR_LABELS.forEach((label,i)=>{
    const angle = Math.PI/2 - i * 2*Math.PI/n;
    const lx = cx + (r + 14) * Math.cos(angle);
    const ly = cy - (r + 14) * Math.sin(angle);
    ctx.fillStyle = 'var(--text-dim)';
    ctx.fillText(label, lx, ly);
  });
  // 中心数值
  ctx.font = 'bold 12px sans-serif';
  ctx.fillStyle = 'var(--cyan)';
  const avg = (values.reduce((a,b)=>a+b,0)/values.length).toFixed(1);
  ctx.fillText(avg, cx, cy+1);
}

function saveCustomCharacter(projectName, data){

  const cid = 'char_'+data.name.replace(/[^a-zA-Z0-9\u4e00-\u9fff]/g,'_');
  const details = data.details.split(/[,，、]/).map(s=>s.trim()).filter(Boolean);
  p.characters[cid] = {
    name: data.name, role: data.role,
    reader_tag: data.tag, tag: data.tag,
    behavioral_model: data.behavior,
    decision_style: details[0]||'',
    risk_attitude: details[1]||'',
    trust_pattern: details[2]||'',
    conflict_style: details[3]||'',
    bottom_line: details[4]||'',
    breaking_point: details[5]||'',
    cares_about: data.cares.split(/[,，、]/).map(s=>s.trim()).filter(Boolean),
    fears: data.fears.split(/[,，、]/).map(s=>s.trim()).filter(Boolean),
    relationships: {},
    traits: [],
    consistency_issues: [],
  };
  saveDB();
  // 保存到磁盘（独立文件）
  saveFileToDisk(projectName, 'characters', `${data.name}.json`, p.characters[cid]);

  saveFileToDisk(projectName, 'characterProfiles', 'characters.json', p.characters);
  toast(`✅ 角色「${data.name}」已保存`);
  renderers.characters();
}

// ─── 显示自定义分析结果（从中央文件按角色名匹配） ───
async function showCharCustomAnalysis(projectName, charName){
  const p = DB.projects[projectName];
  if(!p) return;
  // 从 characters/custom_analysis.md 读取完整分析文本
  const fullText = await readFileFromDisk(projectName, 'characters', 'custom_analysis.md');
  if(!fullText || !fullText.trim()){
    toast('暂无自定义分析结果，请先运行「自定义AI角色分析」','info');
    return;
  }
  // 按角色名匹配段落
  const lines = fullText.split('\n');
  let charSection = [], inChar = false;
  for(const line of lines){
    const isHeader = line.includes('【'+charName+'】') || new RegExp('^#+\\s*[：:]?\\s*'+charName.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')).test(line);
    if(isHeader){ inChar = true; charSection.push(line); continue; }
    if(inChar && !line.includes(charName) && (line.startsWith('【') || /^#\s/.test(line))){ inChar = false; break; }
    if(inChar) charSection.push(line);
  }
  // 如果段落提取失败，尝试全文搜索角色名附近
  let displayText = '';
  if(charSection.length > 3){
    displayText = charSection.join('\n').trim();
  } else {
    // 回退：搜索角色名所在段落
    const idx = fullText.indexOf(charName);
    if(idx >= 0){
      const start = Math.max(0, fullText.lastIndexOf('\n', idx - 500));
      const end = Math.min(fullText.length, fullText.indexOf('\n', idx + 500));
      displayText = (start > 0 ? '...\n' : '') + fullText.substring(start, end) + (end < fullText.length ? '\n...' : '');
    }
  }
  if(!displayText){
    toast('未在分析结果中找到「'+charName+'」相关信息','info');
    return;
  }
  showModal(`
    <h3>📝 ${charName} — 自定义分析结果</h3>
    <div style="font-size:13px;line-height:1.7;white-space:pre-wrap;max-height:65vh;overflow-y:auto;margin-top:8px;padding:12px;background:rgba(0,0,0,.15);border-radius:6px;color:var(--text-dim)">${displayText.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</div>
  `, [
    {text:'关闭', cls:'btn-secondary', fn:closeModal},
  ]);
}

// ═══════ 审查室页面 ═══════
// 完整工作流：编辑器(左) + 建议卡片(右) + 保存到磁盘 + 版本历史
let _reviewInProgress = false;
// ★ 编辑器撤销/重做历史
let _editorUndoStack = [];
let _editorRedoStack = [];
const MAX_UNDO = 50;

// ★ 保存编辑器快照以便撤销
function pushEditorSnapshot(){
  const el = document.getElementById('reviewEditor');
  if(!el) return;
  const val = el.value;
  // 如果与栈顶相同则不重复记录
  if(_editorUndoStack.length && _editorUndoStack[_editorUndoStack.length-1] === val) return;
  _editorUndoStack.push(val);
  if(_editorUndoStack.length > MAX_UNDO) _editorUndoStack.shift();
  _editorRedoStack = []; // 新操作清空重做栈
}

// ★ 撤销
function undoEditor(){
  if(_editorUndoStack.length < 2) return; // 至少保留一个历史
  const el = document.getElementById('reviewEditor');
  if(!el) return;
  // 当前值压入重做栈
  _editorRedoStack.push(el.value);
  // 弹出当前值
  _editorUndoStack.pop();
  const prev = _editorUndoStack[_editorUndoStack.length-1];
  el.value = prev;
  updateUndoButtons();
}

// ★ 重做
function redoEditor(){
  if(!_editorRedoStack.length) return;
  const el = document.getElementById('reviewEditor');
  if(!el) return;
  const next = _editorRedoStack.pop();
  _editorUndoStack.push(next);
  el.value = next;
  updateUndoButtons();
}

// ★ 更新撤销/重做按钮状态
function updateUndoButtons(){
  const ub = document.getElementById('btnUndo');
  const rb = document.getElementById('btnRedo');
  if(ub) ub.style.opacity = _editorUndoStack.length > 1 ? '1' : '0.3';
  if(rb) rb.style.opacity = _editorRedoStack.length ? '1' : '0.3';
}
